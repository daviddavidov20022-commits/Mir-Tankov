<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Голосование — OBS Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: transparent; 
            font-family: 'Inter', sans-serif; 
            color: #E8E6E3;
            overflow: hidden;
        }

        .widget {
            max-width: 420px;
            background: linear-gradient(145deg, rgba(15,20,30,0.95), rgba(10,14,20,0.98));
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 18px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }

        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(168,85,247,0.12);
        }

        .widget-title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.85rem;
            color: #c084fc;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .widget-prize {
            font-size: 0.6rem;
            color: #f5d36e;
            font-weight: 700;
        }

        .widget-timer {
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            color: #c084fc;
            text-align: center;
            padding: 8px;
            background: rgba(168,85,247,0.06);
            border-radius: 10px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .widget-stats {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .widget-stat {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .widget-stat-val {
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            color: #E8E6E3;
        }

        .widget-stat-lbl {
            font-size: 0.45rem;
            color: #5A6577;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .entry-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.5s ease;
        }

        .entry-row:first-child {
            border-color: rgba(200,170,110,0.2);
            background: rgba(200,170,110,0.04);
        }

        .entry-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(168,85,247,0.12), rgba(168,85,247,0.02));
            border-radius: 12px;
            transition: width 0.8s ease;
        }

        .entry-rank {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
            background: rgba(168,85,247,0.15);
            color: #c084fc;
        }

        .entry-rank-1 { background: linear-gradient(135deg, #f5d36e, #C8AA6E); color: #0a0e14; }
        .entry-rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #0a0e14; }
        .entry-rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }

        .entry-info {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        .entry-name {
            font-size: 0.7rem;
            font-weight: 700;
            color: #E8E6E3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-msg {
            font-size: 0.55rem;
            color: #8a94a6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-votes {
            font-family: 'Russo One', sans-serif;
            font-size: 0.8rem;
            color: #c084fc;
            flex-shrink: 0;
            position: relative;
        }

        .entry-votes-label {
            font-size: 0.4rem;
            color: #5A6577;
            text-align: right;
        }

        .finished-banner {
            text-align: center;
            padding: 14px;
            background: linear-gradient(145deg, rgba(200,170,110,0.08), rgba(168,85,247,0.04));
            border: 1px solid rgba(200,170,110,0.2);
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .finished-crown { font-size: 2rem; filter: drop-shadow(0 0 10px rgba(245,190,11,0.4)); }
        .finished-label { font-family: 'Russo One', sans-serif; font-size: 0.6rem; color: #C8AA6E; text-transform: uppercase; letter-spacing: 2px; margin: 4px 0; }
        .finished-name { font-family: 'Russo One', sans-serif; font-size: 1rem; color: #E8E6E3; }
    </style>
<script src="js/auth-interceptor.js?v=52"></script>
</head>
<body>
    <div class="widget" id="widget">
        <div style="text-align:center;padding:20px;color:#5A6577">⏳ Загрузка виджета...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const contestId = params.get('contest_id') || 0;
        const API_URL = params.get('api') || 'https://mir-tankov-production.up.railway.app';
        const REFRESH_MS = 5000;

        // Custom style params from widget editor
        const WS = {
            accent: '#' + (params.get('accent') || 'a855f7'),
            bg: '#' + (params.get('bg') || '0f141e'),
            text: '#' + (params.get('text') || 'e8e6e3'),
            border: '#' + (params.get('border') || 'a855f7'),
            width: parseInt(params.get('w') || '420'),
            radius: parseInt(params.get('r') || '18'),
            opacity: parseInt(params.get('op') || '95'),
            borderWidth: parseInt(params.get('bw') || '1'),
            showTimer: params.get('timer') !== '0',
            showStats: params.get('stats') !== '0',
            showMessages: params.get('msgs') !== '0',
            showPrize: params.get('prize') !== '0',
            showBars: params.get('bars') !== '0',
            maxEntries: parseInt(params.get('max') || '10'),
            titleSize: parseInt(params.get('ts') || '85'),
            textSize: parseInt(params.get('fs') || '70'),
        };

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `${r},${g},${b}`;
        }

        let timerInterval = null;

        async function loadWidget() {
            if (!contestId) {
                document.getElementById('widget').innerHTML = '<div style="text-align:center;padding:20px;color:#f87171">❌ contest_id not specified</div>';
                return;
            }

            try {
                const resp = await fetch(`${API_URL}/api/donate-contest/widget?contest_id=${contestId}`);
                const data = await resp.json();
                if (data.error) {
                    document.getElementById('widget').innerHTML = `<div style="text-align:center;padding:20px;color:#f87171">❌ ${data.error}</div>`;
                    return;
                }

                const c = data.contest;
                const entries = (data.top_entries || []).slice(0, WS.maxEntries);
                const maxVotes = entries.length > 0 ? Math.max(...entries.map(e => e.votes_count || 0), 1) : 1;
                const isFinished = c.status === 'finished';
                const accentRgb = hexToRgb(WS.accent);
                const borderRgb = hexToRgb(WS.border);
                const opHex = Math.round(WS.opacity * 2.55).toString(16).padStart(2, '0');

                // Apply custom widget styles
                const widgetEl = document.getElementById('widget');
                widgetEl.style.maxWidth = WS.width + 'px';
                widgetEl.style.background = WS.bg + opHex;
                widgetEl.style.border = `${WS.borderWidth}px solid rgba(${borderRgb},0.25)`;
                widgetEl.style.borderRadius = WS.radius + 'px';

                let html = `
                    <div class="widget-header" style="border-bottom-color:rgba(${accentRgb},0.12)">
                        <div class="widget-title" style="color:${WS.accent};font-size:${WS.titleSize/100}rem">🗳️ ${c.title}</div>
                        ${WS.showPrize && c.prize ? `<div class="widget-prize">🎁 ${c.prize}</div>` : ''}
                    </div>`;

                // Timer
                if (!isFinished && c.ends_at && WS.showTimer) {
                    html += `<div class="widget-timer" style="color:${WS.accent};background:rgba(${accentRgb},0.06)" id="w-timer">--:--:--</div>`;
                }

                // Winner banner
                if (isFinished) {
                    const winner = entries.find(e => e.id === c.winner_entry_id);
                    if (winner) {
                        html += `
                            <div class="finished-banner">
                                <div class="finished-crown">👑</div>
                                <div class="finished-label">Победитель</div>
                                <div class="finished-name">${winner.nickname}</div>
                                <div style="font-size:0.55rem;color:#c084fc;margin-top:4px">🗳️ ${winner.votes_count} голосов</div>
                            </div>`;
                    }
                }

                // Stats
                if (WS.showStats) {
                    html += `
                        <div class="widget-stats">
                            <div class="widget-stat">
                                <div class="widget-stat-val" style="color:${WS.text}">${data.total_entries}</div>
                                <div class="widget-stat-lbl">участников</div>
                            </div>
                            <div class="widget-stat">
                                <div class="widget-stat-val" style="color:${WS.text}">${data.total_votes}</div>
                                <div class="widget-stat-lbl">голосов</div>
                            </div>
                            <div class="widget-stat">
                                <div class="widget-stat-val" style="color:${WS.text}">🧀 ${data.total_cheese.toLocaleString()}</div>
                                <div class="widget-stat-lbl">собрано</div>
                            </div>
                        </div>`;
                }

                // Top entries
                entries.forEach((e, i) => {
                    const rank = i + 1;
                    const pct = Math.round(((e.votes_count || 0) / maxVotes) * 100);
                    const rankClass = rank <= 3 ? `entry-rank-${rank}` : '';
                    const isWinner = e.id === c.winner_entry_id;

                    html += `
                        <div class="entry-row" ${isWinner ? 'style="border-color:rgba(200,170,110,0.3)"' : ''}>
                            ${WS.showBars ? `<div class="entry-bar" style="width:${pct}%;background:linear-gradient(90deg,rgba(${accentRgb},0.12),rgba(${accentRgb},0.02))"></div>` : ''}
                            <div class="entry-rank ${rankClass}">${rank}</div>
                            <div class="entry-info">
                                <div class="entry-name" style="color:${WS.text};font-size:${WS.textSize/100}rem">${isWinner ? '👑 ' : ''}${e.nickname}</div>
                                ${WS.showMessages ? `<div class="entry-msg" style="font-size:${WS.textSize/100*0.78}rem">${e.message.substring(0, 60)}${e.message.length > 60 ? '...' : ''}</div>` : ''}
                            </div>
                            <div>
                                <div class="entry-votes" style="color:${WS.accent}">${e.votes_count || 0}</div>
                                <div class="entry-votes-label">голосов</div>
                            </div>
                        </div>`;
                });

                document.getElementById('widget').innerHTML = html;

                // Start timer
                if (!isFinished && c.ends_at) {
                    startTimer(c.ends_at);
                }
            } catch (e) {
                console.error('Widget error:', e);
            }
        }

        function startTimer(endsAt) {
            if (timerInterval) clearInterval(timerInterval);
            const endTime = new Date(endsAt).getTime();
            const tick = () => {
                const el = document.getElementById('w-timer');
                if (!el) return;
                const diff = endTime - Date.now();
                if (diff <= 0) { el.textContent = '🔔 ЗАВЕРШЕНО'; el.style.color = '#f87171'; clearInterval(timerInterval); return; }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.textContent = `⏱ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            };
            tick();
            timerInterval = setInterval(tick, 1000);
        }

        // Init
        loadWidget();
        setInterval(loadWidget, REFRESH_MS);
    </script>
</body>
</html>
