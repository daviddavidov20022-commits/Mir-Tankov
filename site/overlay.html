<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: #E8E6E3;
            overflow: hidden;
        }

        .overlay {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(145deg, rgba(10, 14, 20, 0.92), rgba(15, 20, 30, 0.95));
            border: 1px solid rgba(200, 170, 110, 0.2);
            border-radius: 16px;
            min-width: 400px;
            backdrop-filter: blur(10px);
        }

        .overlay-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Russo One', sans-serif;
            font-size: 0.75rem;
            color: #C8AA6E;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .overlay-subtitle {
            font-size: 0.6rem;
            color: #5A6577;
            margin-bottom: 14px;
        }

        .players {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .player {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.5s ease;
        }

        .player-name {
            font-size: 0.7rem;
            color: #8a94a6;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .player-score {
            font-size: 2rem;
            font-family: 'Russo One', sans-serif;
            transition: all 0.5s ease;
        }

        .player-battles {
            font-size: 0.55rem;
            color: #5A6577;
            margin-top: 4px;
        }

        .vs {
            font-size: 1.4rem;
            color: rgba(200, 170, 110, 0.4);
        }

        .status-bar {
            margin-top: 10px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.6rem;
            color: #C8AA6E;
            background: rgba(200, 170, 110, 0.06);
        }

        .winner-banner {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            animation: winPulse 1.5s ease infinite;
        }

        .winner-banner.win {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .winner-banner .trophy {
            font-size: 1.5rem;
        }

        .winner-banner .winner-text {
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            color: #4ade80;
            margin-top: 4px;
        }

        .winner-banner .prize {
            font-size: 0.7rem;
            color: #C8AA6E;
            margin-top: 4px;
        }

        @keyframes winPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }

        @keyframes scoreUpdate {
            0% {
                transform: scale(1.3);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .score-updated {
            animation: scoreUpdate 0.4s ease;
        }

        .loading {
            text-align: center;
            color: #5A6577;
            font-size: 0.8rem;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="overlay" id="overlay">
        <div class="loading" id="loading">⏳ Загрузка челленджа...</div>
    </div>

    <script>
        const API_URL = localStorage.getItem('bot_api_url') || 'http://localhost:8081';
        const params = new URLSearchParams(window.location.search);
        const challengeId = params.get('id');
        const REFRESH_INTERVAL = 30000; // 30 sec

        const COND_DISPLAY = {
            damage: { icon: '💥', name: 'УРОН', key: 'avg_damage', unit: '' },
            spotting: { icon: '👁', name: 'ЗАСВЕТ', key: 'avg_spotted', unit: '' },
            blocked: { icon: '🛡', name: 'БЛОК', key: 'blocked', unit: '' },
            frags: { icon: '🎯', name: 'ФРАГИ', key: 'avg_frags', unit: '' },
            xp: { icon: '⭐', name: 'ОПЫТ', key: 'avg_xp', unit: '' },
            wins: { icon: '🏆', name: 'ПОБЕДЫ', key: 'winrate', unit: '%' },
        };

        let lastV1 = null, lastV2 = null;

        async function loadOverlay() {
            if (!challengeId) {
                document.getElementById('loading').textContent = '❌ Нет ID челленджа';
                return;
            }

            try {
                const resp = await fetch(`${API_URL}/api/challenges/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ challenge_id: parseInt(challengeId), telegram_id: 0 })
                });
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('loading').textContent = `❌ ${data.error}`;
                    return;
                }

                if (data.snapshot_saved) {
                    document.getElementById('loading').textContent = '📸 Ожидаем начала боёв...';
                    return;
                }

                renderOverlay(data);
            } catch (e) {
                document.getElementById('loading').textContent = '❌ Нет подключения';
            }
        }

        function renderOverlay(data) {
            const fp = data.from_player;
            const tp = data.to_player;
            const ch = data.challenge;
            const cond = COND_DISPLAY[ch.condition] || COND_DISPLAY.damage;

            const v1 = fp.delta[cond.key] ?? 0;
            const v2 = tp.delta[cond.key] ?? 0;
            const c1 = v1 >= v2 ? '#4ade80' : '#ef4444';
            const c2 = v2 >= v1 ? '#4ade80' : '#ef4444';

            const v1Changed = lastV1 !== null && lastV1 !== v1;
            const v2Changed = lastV2 !== null && lastV2 !== v2;
            lastV1 = v1; lastV2 = v2;

            let statusHtml = '';
            if (data.both_ready && data.winner) {
                statusHtml = `
                    <div class="winner-banner win">
                        <div class="trophy">🏆</div>
                        <div class="winner-text">${data.winner.nickname} ПОБЕДИЛ!</div>
                        <div class="prize">Приз: 🧀 ${ch.wager * 2}</div>
                    </div>`;
            } else {
                statusHtml = `
                    <div class="status-bar">
                        ${fp.nickname}: ${fp.delta.battles_played}/${ch.battles} · 
                        ${tp.nickname}: ${tp.delta.battles_played}/${ch.battles}
                    </div>`;
            }

            document.getElementById('overlay').innerHTML = `
                <div class="overlay-header">⚔️ ЧЕЛЛЕНДЖ</div>
                <div class="overlay-subtitle">${ch.tank_name} · ${cond.icon} ${cond.name} · 🧀 ${ch.wager}</div>
                <div class="players">
                    <div class="player">
                        <div class="player-name">${fp.nickname}</div>
                        <div class="player-score ${v1Changed ? 'score-updated' : ''}" style="color:${c1}">${v1}${cond.unit}</div>
                        <div class="player-battles">${fp.delta.battles_played}/${ch.battles} боёв</div>
                    </div>
                    <div class="vs">⚔️</div>
                    <div class="player">
                        <div class="player-name">${tp.nickname}</div>
                        <div class="player-score ${v2Changed ? 'score-updated' : ''}" style="color:${c2}">${v2}${cond.unit}</div>
                        <div class="player-battles">${tp.delta.battles_played}/${ch.battles} боёв</div>
                    </div>
                </div>
                ${statusHtml}
            `;
        }

        // Init
        loadOverlay();
        setInterval(loadOverlay, REFRESH_INTERVAL);
    </script>
</body>

</html>
