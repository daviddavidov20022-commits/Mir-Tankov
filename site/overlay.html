<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP Challenge Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: #E8E6E3;
            overflow: hidden;
        }

        .widget {
            display: inline-flex;
            flex-direction: column;
            padding: 20px 28px;
            background: linear-gradient(145deg, rgba(10, 14, 20, 0.94), rgba(15, 20, 30, 0.97));
            border: 1px solid rgba(200, 170, 110, 0.25);
            border-radius: 18px;
            min-width: 480px;
            max-width: 560px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(200, 170, 110, 0.05);
            position: relative;
            overflow: hidden;
        }

        .widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C8AA6E, transparent);
            opacity: 0.5;
        }

        /* Header */
        .widget-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .widget-header .title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.85rem;
            color: #C8AA6E;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .widget-header .icon {
            font-size: 1.1rem;
        }

        /* Subtitle info strip */
        .widget-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .widget-info .info-tag {
            font-size: 0.6rem;
            color: #5A6577;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .widget-info .info-tag .val {
            color: #8a94a6;
            font-weight: 600;
        }

        /* Players section */
        .players-row {
            display: flex;
            align-items: stretch;
            gap: 12px;
            margin-bottom: 14px;
        }

        .player-card {
            flex: 1;
            text-align: center;
            padding: 14px 10px 12px;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.5s ease;
            position: relative;
        }

        .player-card.leading {
            border-color: rgba(74, 222, 128, 0.2);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.05);
        }

        .player-card.losing {
            border-color: rgba(239, 68, 68, 0.15);
        }

        .player-label {
            font-size: 0.55rem;
            color: #5A6577;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .player-name {
            font-family: 'Russo One', sans-serif;
            font-size: 0.8rem;
            color: #E8E6E3;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-score {
            font-size: 2.2rem;
            font-family: 'Russo One', sans-serif;
            line-height: 1;
            margin-bottom: 6px;
            transition: all 0.5s ease;
        }

        .player-score.updated {
            animation: scorePop 0.5s ease;
        }

        .player-battles {
            font-size: 0.6rem;
            color: #5A6577;
            margin-top: 2px;
        }

        .player-battles .done {
            color: #4ade80;
            font-weight: 700;
        }

        /* VS divider */
        .vs-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-width: 36px;
        }

        .vs-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px rgba(200, 170, 110, 0.3));
        }

        .vs-text {
            font-family: 'Russo One', sans-serif;
            font-size: 0.5rem;
            color: rgba(200, 170, 110, 0.4);
            letter-spacing: 2px;
        }

        /* Progress bar */
        .progress-section {
            margin-bottom: 14px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.55rem;
            color: #5A6577;
            margin-bottom: 5px;
        }

        .progress-bar {
            height: 4px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: flex;
        }

        .progress-fill-left {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.8s ease;
            border-radius: 3px 0 0 3px;
        }

        .progress-fill-right {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: width 0.8s ease;
            border-radius: 0 3px 3px 0;
        }

        /* Battle history */
        .battle-log {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 10px;
            margin-bottom: 10px;
        }

        .battle-log-title {
            font-size: 0.55rem;
            color: #5A6577;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .battle-entry {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 3px;
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .battle-entry .be-num {
            color: #5A6577;
            min-width: 18px;
        }

        .battle-entry .be-name {
            color: #8a94a6;
            flex: 1;
        }

        .battle-entry .be-value {
            font-weight: 700;
            min-width: 50px;
            text-align: right;
        }

        /* Winner banner */
        .winner-banner {
            text-align: center;
            padding: 14px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(34, 197, 94, 0.04));
            border: 1px solid rgba(74, 222, 128, 0.2);
            animation: winGlow 2s ease infinite;
        }

        .winner-banner .trophy {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        .winner-banner .winner-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1rem;
            color: #4ade80;
        }

        .winner-banner .winner-prize {
            font-size: 0.7rem;
            color: #C8AA6E;
            margin-top: 4px;
        }

        /* Status / wager footer */
        .widget-footer {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer-tag {
            font-size: 0.55rem;
            color: #5A6577;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .footer-tag .ft-val {
            color: #C8AA6E;
            font-weight: 700;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: #5A6577;
            font-size: 0.8rem;
            padding: 40px;
        }

        .loading .spinner {
            font-size: 1.5rem;
            animation: spin 1.5s linear infinite;
            margin-bottom: 8px;
        }

        /* Animations */
        @keyframes scorePop {
            0% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes winGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.05); }
            50% { box-shadow: 0 0 30px rgba(74, 222, 128, 0.12); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>

<body>
    <div class="widget" id="widget">
        <div class="loading" id="loading">
            <div class="spinner">⚔️</div>
            Загрузка челленджа...
        </div>
    </div>

    <script>
        const API_URL = localStorage.getItem('bot_api_url') || 'http://localhost:8081';
        const params = new URLSearchParams(window.location.search);
        const challengeId = params.get('id');
        const REFRESH_INTERVAL = 20000; // 20 sec

        const COND_DISPLAY = {
            damage:   { icon: '💥', name: 'УРОН',    key: 'damage',  avg: 'avg_damage',  unit: '' },
            spotting: { icon: '👁', name: 'ЗАСВЕТ',  key: 'spotted', avg: 'avg_spotted', unit: '' },
            blocked:  { icon: '🛡', name: 'БЛОК',    key: 'blocked', avg: 'blocked',     unit: '' },
            frags:    { icon: '🎯', name: 'ФРАГИ',   key: 'frags',   avg: 'avg_frags',   unit: '' },
            xp:       { icon: '⭐', name: 'ОПЫТ',    key: 'xp',      avg: 'avg_xp',      unit: '' },
            wins:     { icon: '🏆', name: 'ПОБЕДЫ',  key: 'wins',    avg: 'winrate',     unit: '%' },
        };

        let lastV1 = null, lastV2 = null;

        async function loadWidget() {
            if (!challengeId) {
                document.getElementById('loading').innerHTML = '❌ Нет ID челленджа в URL';
                return;
            }

            try {
                const resp = await fetch(`${API_URL}/api/challenges/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ challenge_id: parseInt(challengeId), telegram_id: 0 })
                });
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('loading').innerHTML = `❌ ${data.error}`;
                    return;
                }

                if (data.snapshot_saved) {
                    document.getElementById('loading').innerHTML =
                        '<div class="spinner">📸</div>Снимок сохранён. Ожидаем начала боёв...';
                    return;
                }

                renderWidget(data);
            } catch (e) {
                document.getElementById('loading').innerHTML = '❌ Нет подключения к серверу';
            }
        }

        function renderWidget(data) {
            const fp = data.from_player;
            const tp = data.to_player;
            const ch = data.challenge;
            const cond = COND_DISPLAY[ch.condition] || COND_DISPLAY.damage;
            const history = data.battle_history || [];

            // Use avg values for display
            const v1 = fp.delta[cond.avg] ?? fp.delta[cond.key] ?? 0;
            const v2 = tp.delta[cond.avg] ?? tp.delta[cond.key] ?? 0;

            const p1Leading = v1 >= v2;
            const p1Color = p1Leading ? '#4ade80' : '#ef4444';
            const p2Color = !p1Leading ? '#4ade80' : '#ef4444';

            const v1Changed = lastV1 !== null && lastV1 !== v1;
            const v2Changed = lastV2 !== null && lastV2 !== v2;
            lastV1 = v1; lastV2 = v2;

            const p1Battles = fp.delta.battles_played || 0;
            const p2Battles = tp.delta.battles_played || 0;
            const reqBattles = ch.battles || 5;

            const p1Pct = Math.min(p1Battles / reqBattles * 50, 50);
            const p2Pct = Math.min(p2Battles / reqBattles * 50, 50);

            // Battle history (last 6)
            let historyHtml = '';
            if (history.length > 0) {
                const recent = history.slice(-6);
                historyHtml = `
                    <div class="battle-log">
                        <div class="battle-log-title">📋 Последние бои</div>
                        ${recent.map(b => {
                            const val = b[cond.key.replace('avg_','')] || b.damage || 0;
                            const isFrom = b.player === 'from';
                            const color = isFrom ? '#60a5fa' : '#f59e0b';
                            return `
                                <div class="battle-entry">
                                    <span class="be-num">#${b.battle_num}</span>
                                    <span class="be-name" style="color:${color}">${b.nickname}</span>
                                    <span class="be-value" style="color:${val > 0 ? '#E8E6E3' : '#5A6577'}">${cond.icon} ${typeof val === 'number' ? val.toLocaleString('ru') : val}</span>
                                </div>`;
                        }).join('')}
                    </div>`;
            }

            // Winner banner
            let resultHtml = '';
            if (data.both_ready && data.winner) {
                resultHtml = `
                    <div class="winner-banner">
                        <div class="trophy">🏆</div>
                        <div class="winner-name">${data.winner.nickname} ПОБЕДИЛ!</div>
                        <div class="winner-prize">Приз: 🧀 ${(ch.wager * 2).toLocaleString('ru')}</div>
                    </div>`;
            }

            document.getElementById('widget').innerHTML = `
                <div class="fade-in">
                    <!-- Header -->
                    <div class="widget-header">
                        <span class="icon">⚔️</span>
                        <span class="title">PVP Челлендж</span>
                        <span class="icon">⚔️</span>
                    </div>

                    <!-- Info tags -->
                    <div class="widget-info">
                        <div class="info-tag">🪖 <span class="val">${ch.tank_name || 'Любой'}</span></div>
                        <div class="info-tag">${cond.icon} <span class="val">${cond.name}</span></div>
                        <div class="info-tag">⚔️ <span class="val">${reqBattles} боёв</span></div>
                        <div class="info-tag">🧀 <span class="val">${ch.wager}</span></div>
                    </div>

                    <!-- Players -->
                    <div class="players-row">
                        <div class="player-card ${p1Leading ? 'leading' : 'losing'}">
                            <div class="player-label">Вызывающий</div>
                            <div class="player-name">${fp.nickname}</div>
                            <div class="player-score ${v1Changed ? 'updated' : ''}" style="color:${p1Color}">
                                ${typeof v1 === 'number' ? v1.toLocaleString('ru') : v1}${cond.unit}
                            </div>
                            <div class="player-battles">
                                ${p1Battles >= reqBattles
                                    ? `<span class="done">✅ ${p1Battles}/${reqBattles}</span>`
                                    : `${p1Battles}/${reqBattles} боёв`
                                }
                            </div>
                        </div>

                        <div class="vs-divider">
                            <span class="vs-icon">⚔️</span>
                            <span class="vs-text">VS</span>
                        </div>

                        <div class="player-card ${!p1Leading ? 'leading' : 'losing'}">
                            <div class="player-label">Принявший</div>
                            <div class="player-name">${tp.nickname}</div>
                            <div class="player-score ${v2Changed ? 'updated' : ''}" style="color:${p2Color}">
                                ${typeof v2 === 'number' ? v2.toLocaleString('ru') : v2}${cond.unit}
                            </div>
                            <div class="player-battles">
                                ${p2Battles >= reqBattles
                                    ? `<span class="done">✅ ${p2Battles}/${reqBattles}</span>`
                                    : `${p2Battles}/${reqBattles} боёв`
                                }
                            </div>
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="progress-section">
                        <div class="progress-labels">
                            <span>${fp.nickname}</span>
                            <span>${tp.nickname}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill-left" style="width:${p1Pct}%"></div>
                            <div style="flex:1"></div>
                            <div class="progress-fill-right" style="width:${p2Pct}%"></div>
                        </div>
                    </div>

                    <!-- Battle history -->
                    ${historyHtml}

                    <!-- Winner or footer -->
                    ${resultHtml || `
                        <div class="widget-footer">
                            <div class="footer-tag">🧀 Ставка: <span class="ft-val">${ch.wager}</span></div>
                            <div class="footer-tag">🏆 Приз: <span class="ft-val">${(ch.wager * 2).toLocaleString('ru')} 🧀</span></div>
                        </div>
                    `}
                </div>
            `;
        }

        // Init
        loadWidget();
        setInterval(loadWidget, REFRESH_INTERVAL);
    </script>
</body>

</html>
