<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            font-family: 'Roboto', sans-serif;
        }

        #music-widget {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: rgba(10, 14, 20, 0.85);
            border: 1px solid rgba(200, 170, 110, 0.3);
            border-left: 4px solid #E040FB;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            transform: translateX(-120%);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            min-width: 300px;
        }

        #music-widget.visible {
            transform: translateX(0);
        }

        .icon { font-size: 24px; margin-right: 15px; animation: pulse 2s infinite; }
        .info { display: flex; flex-direction: column; }
        .label { font-size: 10px; text-transform: uppercase; color: #E040FB; letter-spacing: 1px; margin-bottom: 2px; font-weight: 700; }
        .track-name { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
        .requested-by { font-size: 11px; color: rgba(255, 255, 255, 0.6); margin-top: 2px; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        #yt-player-wrap {
            position: absolute;
            top: -9999px; left: -9999px;
            width: 1px; height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="music-widget">
        <div class="icon">🎵</div>
        <div class="info">
            <div class="label" id="status-label">Сейчас играет</div>
            <div class="track-name" id="track-name">Ожидание заказов...</div>
            <div class="requested-by" id="requested-by">Мир Танков</div>
        </div>
    </div>

    <div id="yt-player-wrap">
        <div id="yt-player"></div>
    </div>

    <script>
        const API_BASE = new URLSearchParams(window.location.search).get('api') || 'https://mir-tankov-production.up.railway.app';
        let player;
        let isPlayerReady = false;
        let isPlaying = false;
        let controlTimer = null;
        let queueTimer = null;

        // Load YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                playerVars: { autoplay: 1, controls: 0 },
                events: {
                    onReady: function() {
                        isPlayerReady = true;
                        console.log("YT Player ready!");
                        startQueuePolling();
                        startControlPolling();
                    },
                    onStateChange: function(e) {
                        console.log("YT state:", e.data);
                        if (e.data === YT.PlayerState.ENDED) {
                            console.log("Track ended naturally");
                            onTrackFinished();
                        }
                        // Force play if cued
                        if (e.data === YT.PlayerState.CUED && isPlaying) {
                            try { player.playVideo(); } catch(err) {}
                        }
                    },
                    onError: function(e) {
                        console.error("YT error:", e.data);
                        onTrackFinished();
                    }
                }
            });
        }

        // ========= CONTROL POLLING =========
        // Polls every 2s even while playing — listens for admin commands
        function startControlPolling() {
            if (controlTimer) clearInterval(controlTimer);
            controlTimer = setInterval(checkControl, 2000);
        }

        async function checkControl() {
            try {
                const resp = await fetch(`${API_BASE}/api/stream/music/control`);
                const data = await resp.json();
                
                if (data.action === 'stop') {
                    console.log("CONTROL: STOP received");
                    stopPlayback();
                } else if (data.action === 'skip') {
                    console.log("CONTROL: SKIP received");
                    stopPlayback();
                    // After stop, queue polling will pick next track
                }
            } catch(e) {
                // Silently ignore control poll errors
            }
        }

        function stopPlayback() {
            isPlaying = false;
            if (player && player.stopVideo) {
                try { player.stopVideo(); } catch(e) {}
            }
            hideWidget();
        }

        function onTrackFinished() {
            isPlaying = false;
            hideWidget();
            // Don't immediately poll — let the next interval handle it
        }

        // ========= QUEUE POLLING =========
        // Polls every 3s — only fetches next track if NOT playing
        function startQueuePolling() {
            if (queueTimer) clearInterval(queueTimer);
            queueTimer = setInterval(checkQueue, 3000);
            checkQueue(); // Immediate first check
        }

        async function checkQueue() {
            // NEVER interrupt a playing track
            if (isPlaying) return;

            try {
                const resp = await fetch(`${API_BASE}/api/stream/music/next`);
                const json = await resp.json();
                
                const track = json.track || json;
                
                if (track && track.url) {
                    console.log("Got track:", track.title || track.url);
                    playTrack(track);
                }
            } catch (e) {
                console.error("Queue fetch error:", e);
            }
        }

        function playTrack(track) {
            const videoId = extractVideoId(track.url);
            console.log("Playing video:", videoId);
            
            if (!videoId) {
                console.error("Bad URL:", track.url);
                return;
            }

            // LOCK immediately
            isPlaying = true;

            // Show widget
            const title = track.title || track.url;
            document.getElementById('track-name').textContent = title;
            document.getElementById('requested-by').textContent = `Заказал: ${track.username || 'Аноним'}`;
            showWidget();

            // Play
            if (isPlayerReady && player && player.loadVideoById) {
                try {
                    player.loadVideoById(videoId);
                } catch(e) {
                    console.error("Play error:", e);
                    isPlaying = false;
                }
            }

            // Safety timeout: 10 min max per track
            setTimeout(() => {
                if (isPlaying) {
                    console.warn("Safety timeout — force finish");
                    onTrackFinished();
                }
            }, 600000);
        }

        function showWidget() {
            document.getElementById('music-widget').classList.add('visible');
        }

        function hideWidget() {
            document.getElementById('music-widget').classList.remove('visible');
        }

        function extractVideoId(url) {
            const m = url.match(/(?:youtu\.be\/|v=|\/embed\/|\/v\/|\/shorts\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        // Fallback: if YT API doesn't load in 5 sec
        setTimeout(() => {
            if (!isPlayerReady) {
                console.warn("YT API timeout, starting polling anyway");
                isPlayerReady = true;
                startQueuePolling();
                startControlPolling();
            }
        }, 5000);
    </script>
</body>
</html>
