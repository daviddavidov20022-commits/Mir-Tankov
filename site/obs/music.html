<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            font-family: 'Roboto', sans-serif;
        }

        #music-widget {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: rgba(10, 14, 20, 0.85);
            border: 1px solid rgba(200, 170, 110, 0.3);
            border-left: 4px solid #E040FB;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            transform: translateX(-120%);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            min-width: 300px;
        }

        #music-widget.visible {
            transform: translateX(0);
        }

        .icon { font-size: 24px; margin-right: 15px; animation: pulse 2s infinite; }
        .info { display: flex; flex-direction: column; }
        .label { font-size: 10px; text-transform: uppercase; color: #E040FB; letter-spacing: 1px; margin-bottom: 2px; font-weight: 700; }
        .track-name { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 350px; }
        .requested-by { font-size: 11px; color: rgba(255, 255, 255, 0.6); margin-top: 2px; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        #yt-player-wrap {
            position: absolute;
            top: -9999px; left: -9999px;
            width: 1px; height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="music-widget">
        <div class="icon">🎵</div>
        <div class="info">
            <div class="label" id="status-label">Сейчас играет</div>
            <div class="track-name" id="track-name">Ожидание заказов...</div>
            <div class="requested-by" id="requested-by">Мир Танков</div>
        </div>
    </div>

    <div id="yt-player-wrap">
        <div id="yt-player"></div>
    </div>

    <script>
        const API_BASE = new URLSearchParams(window.location.search).get('api') || 'https://mir-tankov-production.up.railway.app';
        let player;
        let isPlayerReady = false;
        let isPlaying = false;  // LOCK: prevents checkQueue while a track plays
        let pollTimer = null;

        // Load YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                playerVars: { autoplay: 1, controls: 0 },
                events: {
                    onReady: function() {
                        isPlayerReady = true;
                        console.log("YT Player ready!");
                        checkQueue();
                    },
                    onStateChange: function(e) {
                        // ONLY move to next track when current one ENDS
                        if (e.data === YT.PlayerState.ENDED) {
                            console.log("Track ended naturally");
                            isPlaying = false;
                            hideWidget();
                            setTimeout(checkQueue, 2000);
                        }
                        // Handle errors mid-play
                        if (e.data === YT.PlayerState.CUED) {
                            // Sometimes YT cues instead of playing — force play
                            try { player.playVideo(); } catch(err) {}
                        }
                    },
                    onError: function(e) {
                        console.error("YT error:", e.data);
                        isPlaying = false;
                        hideWidget();
                        setTimeout(checkQueue, 3000);
                    }
                }
            });
        }

        async function checkQueue() {
            // Never interrupt a playing track
            if (isPlaying) {
                console.log("Track is playing, skip poll");
                return;
            }

            console.log("Checking queue...");
            try {
                const resp = await fetch(`${API_BASE}/api/stream/music/next`);
                const json = await resp.json();
                
                const track = json.track || json;
                console.log("Got track:", track);
                
                if (track && track.url) {
                    playTrack(track);
                } else {
                    console.log("Queue empty, checking in 5s...");
                    pollTimer = setTimeout(checkQueue, 5000);
                }
            } catch (e) {
                console.error("Queue fetch error:", e);
                pollTimer = setTimeout(checkQueue, 5000);
            }
        }

        function playTrack(track) {
            const videoId = extractVideoId(track.url);
            console.log("Playing video:", videoId, "from", track.url);
            
            if (!videoId) {
                console.error("Bad URL:", track.url);
                setTimeout(checkQueue, 2000);
                return;
            }

            // Set the playing lock BEFORE loading
            isPlaying = true;

            // Show widget
            document.getElementById('track-name').textContent = track.title || track.url;
            document.getElementById('requested-by').textContent = `Заказал: ${track.username || 'Аноним'}`;
            showWidget();

            // Play
            if (isPlayerReady && player && player.loadVideoById) {
                try {
                    player.loadVideoById(videoId);
                } catch(e) {
                    console.error("Play error:", e);
                    isPlaying = false;
                    setTimeout(checkQueue, 3000);
                }
            }

            // Safety timeout: if YT doesn't fire ENDED after 10 minutes, force next
            setTimeout(() => {
                if (isPlaying) {
                    console.warn("Safety timeout — forcing next track");
                    isPlaying = false;
                    hideWidget();
                    setTimeout(checkQueue, 2000);
                }
            }, 600000); // 10 min max
        }

        function showWidget() {
            document.getElementById('music-widget').classList.add('visible');
        }

        function hideWidget() {
            document.getElementById('music-widget').classList.remove('visible');
        }

        function extractVideoId(url) {
            const m = url.match(/(?:youtu\.be\/|v=|\/embed\/|\/v\/|\/shorts\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        // Fallback: if YT API doesn't load in 5 sec — start polling anyway
        setTimeout(() => {
            if (!isPlayerReady) {
                console.warn("YT API timeout, starting polling anyway");
                isPlayerReady = true;
                checkQueue();
            }
        }, 5000);
    </script>
</body>
</html>
