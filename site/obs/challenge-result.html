<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат Челленджа — OBS Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw; height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        :root {
            --accent: #C8AA6E;
            --accent-rgb: 200,170,110;
            --bg: rgba(8,11,18,0.97);
            --text: #E8E6E3;
            --dim: #8a94a6;
            --muted: #4a5568;
            --win: #4ade80;
            --win-rgb: 74,222,128;
            --lose: #ef4444;
        }

        /* ===== POPUP ===== */
        .popup {
            position: fixed;
            bottom: 30px; right: 30px;
            transform: translateX(120%);
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }
        .popup.show {
            animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        .popup.hide {
            animation: slideOut 0.4s ease-in forwards;
        }
        @keyframes slideIn {
            0%   { transform: translateX(120%) scale(0.9); opacity: 0; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }
        @keyframes slideOut {
            0%   { transform: translateX(0) scale(1); opacity: 1; }
            100% { transform: translateX(120%) scale(0.85); opacity: 0; }
        }

        /* ===== CARD ===== */
        .card {
            width: 360px;
            padding: 0;
            background: var(--bg);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(var(--accent-rgb),0.2);
        }

        /* Animated gradient border */
        .card::before {
            content: '';
            position: absolute; inset: -2px;
            background: conic-gradient(from var(--border-angle, 0deg),
                transparent 30%, var(--accent) 50%, transparent 70%);
            border-radius: 18px;
            z-index: -1;
            animation: rotateBorder 3s linear infinite;
        }
        .card::after {
            content: '';
            position: absolute; inset: 0;
            background: var(--bg);
            border-radius: 16px;
            z-index: -1;
        }
        @property --border-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes rotateBorder {
            to { --border-angle: 360deg; }
        }

        /* Shine sweep */
        .shine {
            position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(var(--accent-rgb),0.08) 45%,
                rgba(var(--accent-rgb),0.15) 50%, rgba(var(--accent-rgb),0.08) 55%, transparent 60%);
            transform: translateX(-100%);
            z-index: 5;
            pointer-events: none;
        }
        .popup.show .shine {
            animation: sweepShine 1.2s 0.3s ease forwards;
        }
        @keyframes sweepShine {
            to { transform: translateX(100%); }
        }

        /* Top accent bar */
        .top-bar {
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), #FFD700, var(--accent), transparent);
            animation: barPulse 2s ease infinite;
        }
        @keyframes barPulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ===== HEADER ROW ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px 8px;
            opacity: 0;
        }
        .popup.show .header { animation: fadeUp 0.4s 0.15s ease forwards; }

        .trophy {
            font-size: 1.6rem;
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }
        .trophy::after {
            content: '';
            position: absolute; inset: -4px;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 50%;
            animation: trophyRing 2s ease infinite;
        }
        @keyframes trophyRing {
            0%,100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }
        .trophy-emoji {
            animation: trophySpin 0.8s 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }
        @keyframes trophySpin {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(180deg) scale(1.2); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        .header-text {
            display: flex; flex-direction: column; gap: 1px;
        }
        .header-type {
            font-family: 'Russo One', sans-serif;
            font-size: 0.6rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-sub {
            font-size: 0.55rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* ===== WINNER BANNER ===== */
        .winner-banner {
            margin: 0 12px 8px;
            padding: 10px 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(var(--win-rgb),0.1), rgba(var(--win-rgb),0.03));
            border: 1px solid rgba(var(--win-rgb),0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }
        .popup.show .winner-banner { animation: fadeUp 0.4s 0.3s ease forwards; }

        /* Gold particles inside winner banner */
        .winner-banner .sparkle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--win);
            border-radius: 50%;
            opacity: 0;
            animation: sparkle 2s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0) translateY(0); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 0.5; transform: scale(0.5) translateY(-15px); }
        }

        .winner-crown {
            font-size: 1.4rem;
            animation: crownBounce 1s 0.7s ease;
        }
        @keyframes crownBounce {
            0%,100% { transform: translateY(0); }
            30% { transform: translateY(-6px) scale(1.15); }
            60% { transform: translateY(-2px); }
        }
        .winner-info { flex: 1; min-width: 0; }
        .winner-label {
            font-size: 0.45rem;
            color: var(--win);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .winner-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1rem;
            color: var(--win);
            text-shadow: 0 0 16px rgba(var(--win-rgb),0.3);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .winner-prize {
            text-align: right;
        }
        .winner-prize-val {
            font-family: 'Russo One', sans-serif;
            font-size: 0.95rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(var(--accent-rgb),0.3);
            animation: prizeGlow 2s ease infinite;
        }
        @keyframes prizeGlow {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .winner-prize-label {
            font-size: 0.4rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== SCORE ROW ===== */
        .scores {
            display: flex;
            align-items: center;
            margin: 0 12px 8px;
            gap: 0;
            opacity: 0;
        }
        .popup.show .scores { animation: fadeUp 0.4s 0.45s ease forwards; }

        .score-side {
            flex: 1;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            text-align: center;
        }
        .score-side:first-child { border-radius: 10px 0 0 10px; }
        .score-side:last-child { border-radius: 0 10px 10px 0; }
        .score-side.is-winner { background: rgba(var(--win-rgb),0.06); }
        .score-side.is-loser { background: rgba(239,68,68,0.04); }

        .score-name {
            font-size: 0.6rem;
            color: var(--dim);
            margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .score-val {
            font-family: 'Russo One', sans-serif;
            font-size: 1.1rem;
            line-height: 1;
        }
        .score-val.win { color: var(--win); }
        .score-val.lose { color: var(--lose); }

        .vs-divider {
            width: 28px; height: 28px;
            display: flex;
            align-items: center; justify-content: center;
            background: rgba(var(--accent-rgb),0.08);
            border: 1px solid rgba(var(--accent-rgb),0.15);
            border-radius: 50%;
            font-family: 'Russo One', sans-serif;
            font-size: 0.4rem;
            color: rgba(var(--accent-rgb),0.5);
            letter-spacing: 1px;
            flex-shrink: 0;
            z-index: 2;
            margin: 0 -6px;
        }

        /* ===== INFO TAGS ===== */
        .tags {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 6px 12px 12px;
            opacity: 0;
        }
        .popup.show .tags { animation: fadeUp 0.4s 0.55s ease forwards; }

        .tag {
            font-size: 0.52rem;
            color: var(--muted);
            display: flex; align-items: center; gap: 3px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .tag .v { color: var(--dim); font-weight: 600; }

        /* Branding */
        .brand {
            text-align: center;
            padding: 5px 0;
            font-size: 0.38rem;
            color: rgba(255,255,255,0.08);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* ===== GOLD PARTICLES ===== */
        .particles {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 90;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        .particle.go {
            animation: particleUp var(--d, 3s) ease-out forwards;
        }
        @keyframes particleUp {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            10% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: translateY(-100vh) rotate(360deg) scale(0.3); }
        }

        /* ===== FADE UP ANIM ===== */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== THEMES ===== */
        body.theme-neon {
            --accent: #a855f7; --accent-rgb: 168,85,247;
            --win: #22d3ee; --win-rgb: 34,211,238; --lose: #f472b6;
        }
        body.theme-fire {
            --accent: #f97316; --accent-rgb: 249,115,22;
            --win: #fbbf24; --win-rgb: 251,191,36; --lose: #ef4444;
        }
        body.theme-ice {
            --accent: #38bdf8; --accent-rgb: 56,189,248;
            --win: #67e8f9; --win-rgb: 103,232,249; --lose: #a5b4fc;
        }
        body.theme-blood {
            --accent: #dc2626; --accent-rgb: 220,38,38;
            --win: #fca5a5; --win-rgb: 252,165,165; --lose: #fbbf24;
        }
        body.theme-cyber {
            --accent: #22d3ee; --accent-rgb: 34,211,238;
            --win: #34d399; --win-rgb: 52,211,153; --lose: #c084fc;
        }
        body.theme-military {
            --accent: #6b8a3d; --accent-rgb: 107,138,61;
            --win: #86efac; --win-rgb: 134,239,172; --lose: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="popup" id="popup">
        <div class="card" id="card"></div>
    </div>

    <script>
        // ===== CONFIG =====
        const P = new URLSearchParams(location.search);
        const API = P.get('api') || localStorage.getItem('bot_api_url') || 'https://mir-tankov-production.up.railway.app';
        const POLL = parseInt(P.get('poll')) || 5000;
        const DUR  = parseInt(P.get('duration')) || 10000;
        const SND  = P.get('sound') !== '0';
        const theme = P.get('theme') || 'gold';
        if (theme !== 'gold') document.body.classList.add('theme-' + theme);
        const customAccent = P.get('accent');
        if (customAccent) {
            const c = '#' + customAccent;
            document.documentElement.style.setProperty('--accent', c);
            const r = parseInt(customAccent.slice(0,2),16);
            const g = parseInt(customAccent.slice(2,4),16);
            const b = parseInt(customAccent.slice(4,6),16);
            document.documentElement.style.setProperty('--accent-rgb', `${r},${g},${b}`);
        }

        let showing = false;
        let audioCtx = null;

        const COND = {
            damage:   { i:'💥', n:'УРОН'   },
            spotting: { i:'👁', n:'ЗАСВЕТ' },
            blocked:  { i:'🛡', n:'БЛОК'   },
            frags:    { i:'🎯', n:'ФРАГИ'  },
            xp:       { i:'⭐', n:'ОПЫТ'   },
            wins:     { i:'🏆', n:'ПОБЕДЫ' },
        };

        // ===== SOUND =====
        function playSound() {
            if (!SND) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523, 659, 784, 1047];
            notes.forEach((f, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.12);
                g.gain.setValueAtTime(0.25, audioCtx.currentTime + i*0.12);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.12 + 0.5);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(audioCtx.currentTime + i*0.12);
                o.stop(audioCtx.currentTime + i*0.12 + 0.5);
            });
        }

        // ===== GOLD PARTICLES =====
        function spawnParticles() {
            const c = document.getElementById('particles');
            c.innerHTML = '';
            const colors = ['#FFD700','#C8AA6E','#FFF8DC','#FBBF24','#E8D5A3','#fff'];
            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.className = 'particle';
                el.style.left = (50 + (Math.random()-0.5)*80) + '%';
                el.style.bottom = '-10px';
                el.style.setProperty('--d', (1.5 + Math.random()*2.5) + 's');
                el.style.background = colors[Math.floor(Math.random()*colors.length)];
                el.style.width = el.style.height = (2 + Math.random()*5) + 'px';
                el.style.animationDelay = (Math.random()*0.8) + 's';
                el.style.boxShadow = `0 0 ${4+Math.random()*6}px ${colors[0]}40`;
                c.appendChild(el);
                requestAnimationFrame(() => el.classList.add('go'));
            }
        }

        // ===== ANIMATED SCORE COUNTER =====
        function animateCounter(el, target) {
            const dur = 800;
            const start = performance.now();
            const fmt = v => Math.round(v).toLocaleString('ru');
            function tick(now) {
                const p = Math.min((now - start) / dur, 1);
                const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
                el.textContent = fmt(target * eased);
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        // ===== SHOW RESULT =====
        function showResult(ev) {
            if (showing) return;
            showing = true;

            const popup = document.getElementById('popup');
            const card = document.getElementById('card');
            const cnd = COND[ev.condition] || COND.damage;
            const wIsFrom = ev.winner_name === ev.from_name;

            let typeLabel = '⚔️ PVP ЧЕЛЛЕНДЖ';
            if (ev.type === 'team') typeLabel = '👥 КОМАНДЫ';
            else if (ev.type === 'global') typeLabel = '🔥 ОБЩИЙ';

            // Winner sparkles
            let sparkles = '';
            for (let i = 0; i < 6; i++) {
                sparkles += `<span class="sparkle" style="left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation-delay:${Math.random()*2}s"></span>`;
            }

            card.innerHTML = `
                <div class="shine"></div>
                <div class="top-bar"></div>

                <div class="header">
                    <div class="trophy"><span class="trophy-emoji">🏆</span></div>
                    <div class="header-text">
                        <div class="header-type">${typeLabel}</div>
                        <div class="header-sub">ЗАВЕРШЁН</div>
                    </div>
                </div>

                <div class="winner-banner">
                    ${sparkles}
                    <div class="winner-crown">👑</div>
                    <div class="winner-info">
                        <div class="winner-label">ПОБЕДИТЕЛЬ</div>
                        <div class="winner-name">${ev.winner_name}</div>
                    </div>
                    <div class="winner-prize">
                        <div class="winner-prize-val">🧀 ${ev.prize ? ev.prize.toLocaleString('ru') : '???'}</div>
                        <div class="winner-prize-label">выигрыш</div>
                    </div>
                </div>

                <div class="scores">
                    <div class="score-side ${wIsFrom ? 'is-winner' : 'is-loser'}">
                        <div class="score-name">${ev.from_name}</div>
                        <div class="score-val ${wIsFrom ? 'win' : 'lose'}" data-target="${ev.from_score}">0</div>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="score-side ${!wIsFrom ? 'is-winner' : 'is-loser'}">
                        <div class="score-name">${ev.to_name}</div>
                        <div class="score-val ${!wIsFrom ? 'win' : 'lose'}" data-target="${ev.to_score}">0</div>
                    </div>
                </div>

                <div class="tags">
                    ${ev.tank_name ? `<div class="tag">🪖 <span class="v">${ev.tank_name}</span></div>` : ''}
                    <div class="tag">${cnd.i} <span class="v">${cnd.n}</span></div>
                    ${ev.battles ? `<div class="tag">⚔️ <span class="v">${ev.battles} боёв</span></div>` : ''}
                </div>

                <div class="brand">⚔️ Мир Танков Клуб</div>
            `;

            // Show
            popup.classList.remove('hide');
            popup.classList.add('show');
            playSound();
            spawnParticles();

            // Animate score counters after delay
            setTimeout(() => {
                card.querySelectorAll('.score-val[data-target]').forEach(el => {
                    animateCounter(el, parseInt(el.dataset.target));
                });
            }, 500);

            // Auto-hide
            setTimeout(() => {
                popup.classList.remove('show');
                popup.classList.add('hide');
                setTimeout(() => {
                    popup.classList.remove('hide');
                    showing = false;
                }, 500);
            }, DUR);
        }

        // ===== POLLING =====
        async function poll() {
            if (showing) return;
            try {
                const r = await fetch(`${API}/api/stream/challenge-results/latest`);
                const d = await r.json();
                if (d.event) showResult(d.event);
            } catch(e) {}
        }
        setInterval(poll, POLL);

        // ===== TEST MODE =====
        if (P.has('test') || P.has('demo')) {
            const mk = (text, bg, clr, data) => {
                const b = document.createElement('button');
                b.textContent = text;
                b.style.cssText = `position:fixed;bottom:${bg==='#C8AA6E'?'10':'50'}px;right:10px;z-index:9999;padding:10px 20px;font-size:13px;background:${bg};color:${clr};border:none;border-radius:8px;cursor:pointer;font-weight:bold;`;
                b.onclick = () => showResult(data);
                document.body.appendChild(b);
            };
            mk('🏆 Тест PVP', '#C8AA6E', '#000', {
                type:'pvp', condition:'damage',
                from_name:'GloriAmtower', to_name:'Fors777_2016',
                from_score:18420, to_score:14850,
                winner_name:'GloriAmtower', tank_name:'Объект 140', battles:5, prize:2000
            });
            mk('👥 Тест команды', '#3b82f6', '#fff', {
                type:'team', condition:'damage',
                from_name:'Альфа', to_name:'Браво',
                from_score:24600, to_score:19300,
                winner_name:'Альфа', tank_name:'', battles:5, prize:1500
            });
        }
    </script>
</body>
</html>
