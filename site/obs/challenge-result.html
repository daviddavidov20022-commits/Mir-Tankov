<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат Челленджа — OBS Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --accent: #C8AA6E;
            --accent-glow: rgba(200, 170, 110, 0.4);
            --bg: rgba(10, 14, 20, 0.96);
            --bg2: rgba(15, 20, 30, 0.98);
            --text: #E8E6E3;
            --text-dim: #8a94a6;
            --text-muted: #5A6577;
            --winner-color: #4ade80;
            --loser-color: #ef4444;
        }

        /* ===== POPUP CONTAINER ===== */
        .result-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }
        .result-popup.show {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .result-popup.hide {
            animation: popOut 0.5s ease-in forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-5deg); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.05) rotate(1deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -60%) scale(0.7); opacity: 0; }
        }

        /* ===== WIDGET CARD ===== */
        .widget-card {
            display: flex; flex-direction: column;
            padding: 24px 30px;
            background: linear-gradient(145deg, var(--bg), var(--bg2));
            border: 1px solid rgba(200, 170, 110, 0.3);
            border-radius: 20px;
            min-width: 440px; max-width: 520px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 40px rgba(200, 170, 110, 0.15),
                0 12px 50px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            overflow: hidden;
        }

        /* Top glow line */
        .widget-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), #FFD700, var(--accent), transparent);
            opacity: 0.8;
            animation: shimmer 2s ease infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ===== TROPHY HEADER ===== */
        .trophy-header {
            text-align: center;
            margin-bottom: 16px;
        }
        .trophy-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 4px;
            animation: trophyBounce 0.8s ease 0.5s;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
        }
        @keyframes trophyBounce {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.3) rotate(-5deg); }
            60% { transform: scale(1.15) rotate(3deg); }
        }
        .trophy-title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ===== WINNER SECTION ===== */
        .winner-section {
            text-align: center;
            padding: 14px 20px;
            margin-bottom: 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(74,222,128,0.08), rgba(34,197,94,0.03));
            border: 1px solid rgba(74,222,128,0.2);
            animation: winnerGlow 2s ease infinite;
        }
        @keyframes winnerGlow {
            0%,100% { box-shadow: 0 0 15px rgba(74,222,128,0.05); }
            50% { box-shadow: 0 0 30px rgba(74,222,128,0.15); }
        }
        .winner-label {
            font-size: 0.55rem;
            color: var(--winner-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .winner-name {
            font-family: 'Russo One', sans-serif;
            font-size: 1.3rem;
            color: var(--winner-color);
            text-shadow: 0 0 20px rgba(74,222,128,0.3);
        }

        /* ===== VS ROW ===== */
        .vs-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .player-block {
            flex: 1;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
            text-align: center;
        }
        .player-block.winner-block {
            border-color: rgba(74,222,128,0.2);
        }
        .player-block.loser-block {
            border-color: rgba(239,68,68,0.15);
        }
        .pb-name {
            font-family: 'Russo One', sans-serif;
            font-size: 0.7rem;
            color: var(--text);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pb-score {
            font-family: 'Russo One', sans-serif;
            font-size: 1.4rem;
            line-height: 1;
        }
        .pb-score.win { color: var(--winner-color); }
        .pb-score.lose { color: var(--loser-color); }

        .vs-badge {
            font-family: 'Russo One', sans-serif;
            font-size: 0.5rem;
            color: rgba(200,170,110,0.3);
            letter-spacing: 2px;
        }

        /* ===== INFO STRIP ===== */
        .info-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .info-tag {
            font-size: 0.6rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .info-tag .val {
            color: var(--text-dim);
            font-weight: 600;
        }

        /* ===== PRIZE BAR ===== */
        .prize-bar {
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(200,170,110,0.06), rgba(200,170,110,0.02));
            border: 1px solid rgba(200,170,110,0.15);
        }
        .prize-amount {
            font-family: 'Russo One', sans-serif;
            font-size: 1rem;
            color: var(--accent);
            text-shadow: 0 0 12px var(--accent-glow);
        }
        .prize-label {
            font-size: 0.5rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== BRANDING ===== */
        .brand {
            text-align: center;
            padding-top: 8px;
            margin-top: 10px;
            font-size: 0.42rem;
            color: rgba(255,255,255,0.1);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        /* ===== CONFETTI PARTICLES ===== */
        .confetti-container {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 90;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            opacity: 0;
        }
        .confetti.show {
            animation: confettiFall var(--dur, 3s) ease-out forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        /* ===== THEME VARIANTS ===== */
        body.theme-neon {
            --accent: #a855f7; --accent-glow: rgba(168,85,247,0.4);
            --winner-color: #22d3ee; --loser-color: #f472b6;
        }
        body.theme-fire {
            --accent: #f97316; --accent-glow: rgba(249,115,22,0.4);
            --winner-color: #fbbf24; --loser-color: #ef4444;
        }
        body.theme-ice {
            --accent: #38bdf8; --accent-glow: rgba(56,189,248,0.4);
            --winner-color: #67e8f9; --loser-color: #a5b4fc;
        }
        body.theme-blood {
            --accent: #dc2626; --accent-glow: rgba(220,38,38,0.4);
            --winner-color: #fca5a5; --loser-color: #fbbf24;
        }
        body.theme-cyber {
            --accent: #22d3ee; --accent-glow: rgba(34,211,238,0.4);
            --winner-color: #34d399; --loser-color: #c084fc;
        }
        body.theme-military {
            --accent: #6b8a3d; --accent-glow: rgba(107,138,61,0.4);
            --winner-color: #86efac; --loser-color: #fca5a5;
        }

        /* Sound toggle */
        body.no-sound .confetti-container { display: none; }
    </style>
</head>
<body>
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="result-popup" id="popup">
        <div class="widget-card" id="widgetCard"></div>
    </div>

    <script>
        // ===== CONFIG FROM URL PARAMS =====
        const params = new URLSearchParams(window.location.search);
        const API_URL = params.get('api') || localStorage.getItem('bot_api_url') || 'https://mir-tankov-production.up.railway.app';
        const POLL_INTERVAL = parseInt(params.get('poll')) || 5000;
        const DISPLAY_DURATION = parseInt(params.get('duration')) || 10000;
        const SOUND_ENABLED = params.get('sound') !== '0';

        // Theme
        const theme = params.get('theme') || 'gold';
        if (theme !== 'gold') document.body.classList.add('theme-' + theme);

        // Custom accent
        const customAccent = params.get('accent');
        if (customAccent) {
            const c = '#' + customAccent;
            document.documentElement.style.setProperty('--accent', c);
            document.documentElement.style.setProperty('--accent-glow', c + '60');
        }

        // ===== STATE =====
        let isShowing = false;
        let audioCtx = null;

        // ===== CONDITION DISPLAY MAP =====
        const COND_MAP = {
            damage:   { icon: '💥', name: 'УРОН' },
            spotting: { icon: '👁', name: 'ЗАСВЕТ' },
            blocked:  { icon: '🛡', name: 'БЛОК' },
            frags:    { icon: '🎯', name: 'ФРАГИ' },
            xp:       { icon: '⭐', name: 'ОПЫТ' },
            wins:     { icon: '🏆', name: 'ПОБЕДЫ' },
        };

        // ===== SOUND =====
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playVictorySound() {
            if (!SOUND_ENABLED) return;
            const ctx = getAudioCtx();
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.6);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime + i * 0.15);
                osc.stop(ctx.currentTime + i * 0.15 + 0.6);
            });
        }

        // ===== CONFETTI =====
        function spawnConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#FFD700', '#C8AA6E', '#4ade80', '#60a5fa', '#f472b6', '#a855f7', '#fbbf24', '#ef4444'];
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = -10 + 'px';
                el.style.setProperty('--dur', (2 + Math.random() * 2) + 's');
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                el.style.width = (4 + Math.random() * 8) + 'px';
                el.style.height = (4 + Math.random() * 8) + 'px';
                el.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(el);
                // Trigger animation
                requestAnimationFrame(() => el.classList.add('show'));
            }
        }

        // ===== RENDER RESULT =====
        function showResult(event) {
            if (isShowing) return;
            isShowing = true;

            const popup = document.getElementById('popup');
            const card = document.getElementById('widgetCard');
            const cond = COND_MAP[event.condition] || COND_MAP.damage;

            const winnerIsFrom = event.winner_name === event.from_name;
            const fromScore = typeof event.from_score === 'number' ? event.from_score.toLocaleString('ru') : event.from_score;
            const toScore = typeof event.to_score === 'number' ? event.to_score.toLocaleString('ru') : event.to_score;

            // Determine challenge type label
            let typeLabel = '⚔️ PVP ЧЕЛЛЕНДЖ';
            let typeIcon = '⚔️';
            if (event.type === 'team') {
                typeLabel = '👥 КОМАНДНОЕ СРАЖЕНИЕ';
                typeIcon = '👥';
            } else if (event.type === 'global') {
                typeLabel = '🔥 ОБЩИЙ ЧЕЛЛЕНДЖ';
                typeIcon = '🔥';
            }

            card.innerHTML = `
                <div class="trophy-header">
                    <span class="trophy-icon">🏆</span>
                    <div class="trophy-title">${typeLabel} — ЗАВЕРШЁН</div>
                </div>

                <div class="winner-section">
                    <div class="winner-label">🏆 ПОБЕДИТЕЛЬ</div>
                    <div class="winner-name">${event.winner_name}</div>
                </div>

                <div class="vs-row">
                    <div class="player-block ${winnerIsFrom ? 'winner-block' : 'loser-block'}">
                        <div class="pb-name">${event.from_name}</div>
                        <div class="pb-score ${winnerIsFrom ? 'win' : 'lose'}">${fromScore}</div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="player-block ${!winnerIsFrom ? 'winner-block' : 'loser-block'}">
                        <div class="pb-name">${event.to_name}</div>
                        <div class="pb-score ${!winnerIsFrom ? 'win' : 'lose'}">${toScore}</div>
                    </div>
                </div>

                <div class="info-strip">
                    ${event.tank_name ? `<div class="info-tag">🪖 <span class="val">${event.tank_name}</span></div>` : ''}
                    <div class="info-tag">${cond.icon} <span class="val">${cond.name}</span></div>
                    ${event.battles ? `<div class="info-tag">⚔️ <span class="val">${event.battles} боёв</span></div>` : ''}
                </div>

                <div class="prize-bar">
                    <div class="prize-amount">🧀 ${event.prize ? event.prize.toLocaleString('ru') : '???'}</div>
                    <div class="prize-label">ВЫИГРЫШ</div>
                </div>

                <div class="brand">⚔️ Мир Танков Клуб · t.me/MirTankovClub</div>
            `;

            // Show popup
            popup.classList.remove('hide');
            popup.classList.add('show');

            // Effects
            playVictorySound();
            spawnConfetti();

            // Auto-hide
            setTimeout(() => {
                popup.classList.remove('show');
                popup.classList.add('hide');
                setTimeout(() => {
                    popup.classList.remove('hide');
                    isShowing = false;
                }, 600);
            }, DISPLAY_DURATION);
        }

        // ===== POLLING =====
        async function pollResults() {
            if (isShowing) return;
            try {
                const resp = await fetch(`${API_URL}/api/stream/challenge-results/latest`);
                const data = await resp.json();
                if (data.event) {
                    showResult(data.event);
                }
            } catch(e) {
                // Silently retry
            }
        }

        // ===== INIT =====
        setInterval(pollResults, POLL_INTERVAL);
        console.log('[Мир Танков] Challenge Result Widget запущен. API:', API_URL, 'Poll:', POLL_INTERVAL + 'ms');

        // ===== TEST MODE =====
        if (params.has('test') || params.has('demo')) {
            const btn = document.createElement('button');
            btn.textContent = '🏆 Тест результата';
            btn.style.cssText = 'position:fixed;bottom:10px;right:10px;z-index:9999;padding:12px 24px;font-size:14px;background:#C8AA6E;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:bold;';
            btn.onclick = () => showResult({
                type: 'pvp',
                condition: 'damage',
                from_name: 'GloriAmtower',
                to_name: 'Fors777_2016',
                from_score: 18420,
                to_score: 14850,
                winner_name: 'GloriAmtower',
                tank_name: 'Объект 140',
                battles: 5,
                prize: 2000
            });
            document.body.appendChild(btn);

            const btn2 = document.createElement('button');
            btn2.textContent = '👥 Тест команды';
            btn2.style.cssText = 'position:fixed;bottom:10px;right:210px;z-index:9999;padding:12px 24px;font-size:14px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;';
            btn2.onclick = () => showResult({
                type: 'team',
                condition: 'damage',
                from_name: 'Альфа',
                to_name: 'Браво',
                from_score: 24600,
                to_score: 19300,
                winner_name: 'Альфа',
                tank_name: '',
                battles: 5,
                prize: 1500
            });
            document.body.appendChild(btn2);
        }
    </script>
</body>
</html>
