<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подписчики в бою — OBS Widget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            color: #fff;
            overflow: hidden;
            width: 380px;
            min-height: 100px;
        }

        /* ── Контейнер ── */
        .widget {
            width: 380px;
            position: relative;
        }

        /* ── Пустое состояние ── */
        .widget--empty {
            display: none;
        }

        /* ── Заголовок ── */
        .header {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.03));
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 12px 12px 0 0;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
            box-shadow: 0 0 15px #3b82f6;
            animation: headerGlow 3s ease-in-out infinite;
        }
        .header__icon {
            font-size: 1.6rem;
            animation: iconBounce 2s ease-in-out infinite;
        }
        .header__text {
            flex: 1;
        }
        .header__title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.85rem;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(59,130,246,0.5);
            letter-spacing: 1px;
        }
        .header__count {
            font-size: 0.6rem;
            color: #9AA4B5;
            margin-top: 1px;
        }
        .header__badge {
            font-family: 'Russo One', sans-serif;
            font-size: 1.3rem;
            color: #60a5fa;
            text-shadow: 0 0 20px rgba(59,130,246,0.8);
            animation: badgePulse 1.5s ease-in-out infinite;
        }

        /* ── Карточки подписчиков ── */
        .cards {
            display: flex;
            flex-direction: column;
            background: rgba(10,14,20,0.9);
            border: 1px solid rgba(59,130,246,0.15);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }

        .sub-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            opacity: 0;
            transform: translateX(-100px) scale(0.8);
            animation: cardReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .sub-card:last-child { border-bottom: none; }

        /* Фоновый блик */
        .sub-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            animation: cardShine 2s ease forwards;
            animation-delay: inherit;
        }

        .sub-card--ally { 
            background: linear-gradient(90deg, rgba(74,222,128,0.08), transparent);
            border-left: 3px solid #4ade80;
        }
        .sub-card--enemy { 
            background: linear-gradient(90deg, rgba(239,68,68,0.08), transparent);
            border-left: 3px solid #ef4444;
        }

        .sub-card__side {
            font-size: 1.2rem;
            flex-shrink: 0;
            animation: sideGlow 2s ease-in-out infinite;
        }

        .sub-card__info {
            flex: 1;
            min-width: 0;
        }
        .sub-card__nick {
            font-family: 'Russo One', sans-serif;
            font-size: 0.9rem;
            color: #E8E6E3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .sub-card__tank {
            font-size: 0.6rem;
            color: #5A6577;
            margin-top: 1px;
        }

        /* ── Сыр летит ── */
        .sub-card__cheese {
            position: relative;
            flex-shrink: 0;
        }
        .cheese-emoji {
            font-size: 1.5rem;
            display: block;
            animation: cheeseAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0) rotate(-180deg);
        }
        .cheese-sparkle {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: #fbbf24;
            opacity: 0;
            animation: sparkle 1s ease-out forwards;
        }

        /* ── Бейдж ТГ ── */
        .sub-card__badge {
            font-size: 0.5rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(59,130,246,0.1));
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
            animation: badgeSlide 0.5s ease forwards;
            opacity: 0;
            transform: scale(0);
        }

        /* ── Летающие частицы фона ── */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: particleRise 4s ease-in-out infinite;
        }

        /* ── АНИМАЦИИ ── */
        @keyframes headerGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-3px) scale(1.1); }
        }
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }
        @keyframes cardReveal {
            0% { opacity: 0; transform: translateX(-100px) scale(0.8); }
            60% { opacity: 1; transform: translateX(10px) scale(1.02); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes cardShine {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        @keyframes sideGlow {
            0%, 100% { filter: drop-shadow(0 0 3px currentColor); }
            50% { filter: drop-shadow(0 0 10px currentColor); }
        }
        @keyframes cheeseAppear {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }
            70% { opacity: 1; transform: scale(1.3) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        @keyframes sparkle {
            0% { opacity: 1; transform: scale(1) translate(0, 0); }
            100% { opacity: 0; transform: scale(0.5) translate(var(--sx), var(--sy)); }
        }
        @keyframes badgeSlide {
            0% { opacity: 0; transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes particleRise {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-50px) scale(1); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    <div class="widget widget--empty" id="widget"></div>

    <script>
        // ==========================================
        // CONFIG
        // ==========================================
        const params = new URLSearchParams(window.location.search);
        const API_URL = params.get('api') || 'https://mir-tankov-production.up.railway.app';
        const RADAR_JSON = params.get('json') || 'radar_results_overlay.json';
        const DEMO_MODE = params.get('demo') !== '0'; // demo by default, ?demo=0 to disable
        const DEMO_ALLY_COUNT = parseInt(params.get('allies') || '2');
        const DEMO_ENEMY_COUNT = parseInt(params.get('enemies') || '1');
        const SHOW_DURATION = parseInt(params.get('duration') || '8') * 1000; // seconds to show
        const REFRESH_MS = 2000;

        let lastBattleNumber = null;
        let hideTimeout = null;

        // ==========================================
        // BACKGROUND PARTICLES
        // ==========================================
        function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'bg-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = (2 + Math.random() * 4) + 'px';
                p.style.height = p.style.width;
                p.style.animationDuration = (3 + Math.random() * 5) + 's';
                p.style.animationDelay = Math.random() * 4 + 's';
                const colors = ['#3b82f6', '#60a5fa', '#fbbf24', '#4ade80'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(p);
            }
        }
        createParticles();

        // ==========================================
        // RENDER
        // ==========================================
        function showSubscribers(subs, allData) {
            const widget = document.getElementById('widget');
            widget.classList.remove('widget--empty');

            if (hideTimeout) clearTimeout(hideTimeout);

            let html = `
                <div class="header">
                    <div class="header__icon">📢</div>
                    <div class="header__text">
                        <div class="header__title">ПОДПИСЧИКИ В БОЮ</div>
                        <div class="header__count">Бой #${allData.battle_number || '?'} · Telegram-канал</div>
                    </div>
                    <div class="header__badge">${subs.length}</div>
                </div>
                <div class="cards">
            `;

            subs.forEach((sub, i) => {
                const delay = 0.3 + i * 0.25;
                const cheeseDelay = delay + 0.5;
                const badgeDelay = delay + 0.7;
                const sideClass = sub.isAlly ? 'sub-card--ally' : 'sub-card--enemy';
                const sideIcon = sub.isAlly ? '🟢' : '🔴';

                // Sparkle offsets for cheese
                let sparklesHtml = '';
                for (let s = 0; s < 6; s++) {
                    const angle = (s / 6) * Math.PI * 2;
                    const dist = 15 + Math.random() * 15;
                    sparklesHtml += `<div class="cheese-sparkle" style="
                        --sx: ${Math.cos(angle) * dist}px;
                        --sy: ${Math.sin(angle) * dist}px;
                        animation-delay: ${cheeseDelay + 0.1}s;
                        top: 50%; left: 50%;
                        transform: translate(-50%, -50%);
                    "></div>`;
                }

                html += `
                    <div class="sub-card ${sideClass}" style="animation-delay: ${delay}s">
                        <div class="sub-card__side">${sideIcon}</div>
                        <div class="sub-card__info">
                            <div class="sub-card__nick">${sub.nick}</div>
                            <div class="sub-card__tank">${sub.tank || 'Загрузка...'}</div>
                        </div>
                        <div class="sub-card__cheese">
                            <span class="cheese-emoji" style="animation-delay: ${cheeseDelay}s">🧀</span>
                            ${sparklesHtml}
                        </div>
                        <div class="sub-card__badge" style="animation-delay: ${badgeDelay}s">ТГ</div>
                    </div>
                `;
            });

            html += `</div>`;
            widget.innerHTML = html;

            // Auto-hide
            hideTimeout = setTimeout(() => {
                widget.style.animation = 'fadeOut 1s ease forwards';
                setTimeout(() => {
                    widget.classList.add('widget--empty');
                    widget.innerHTML = '';
                    widget.style.animation = '';
                }, 1000);
            }, SHOW_DURATION);
        }

        // ==========================================
        // DATA LOADING
        // ==========================================
        async function checkBattle() {
            try {
                const resp = await fetch(RADAR_JSON + '?t=' + Date.now());
                if (!resp.ok) return;
                const data = await resp.json();

                if (!data.battle_number || data.battle_number === lastBattleNumber) return;
                lastBattleNumber = data.battle_number;

                const allies = data.allies || [];
                const enemies = data.enemies || [];

                if (DEMO_MODE) {
                    // DEMO: randomly pick subscribers
                    const shuffledAllies = [...allies].sort(() => Math.random() - 0.5);
                    const shuffledEnemies = [...enemies].sort(() => Math.random() - 0.5);
                    const fakeAllies = shuffledAllies.slice(0, Math.min(DEMO_ALLY_COUNT, allies.length));
                    const fakeEnemies = shuffledEnemies.slice(0, Math.min(DEMO_ENEMY_COUNT, enemies.length));

                    const subs = [
                        ...fakeAllies.map(p => ({ ...p, isAlly: true })),
                        ...fakeEnemies.map(p => ({ ...p, isAlly: false }))
                    ];

                    if (subs.length > 0) showSubscribers(subs, data);
                } else {
                    // REAL: check via API
                    const allPlayers = [...allies, ...enemies];
                    const accountIds = allPlayers.map(p => p.account_id).filter(Boolean);
                    const nicknames = allPlayers.map(p => p.nick).filter(Boolean);

                    const resp2 = await fetch(API_URL + '/api/users/check', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account_ids: accountIds, nicknames: nicknames })
                    });
                    const result = await resp2.json();

                    if (result.registered) {
                        const subs = allPlayers
                            .filter(p => result.registered[p.account_id] || result.registered[p.nick])
                            .map(p => ({
                                ...p,
                                isAlly: allies.some(a => a.nick === p.nick)
                            }));

                        if (subs.length > 0) showSubscribers(subs, data);
                    }
                }
            } catch(e) {}
        }

        // ==========================================
        // INIT
        // ==========================================
        if (params.get('demo') === 'instant') {
            // Instant demo - show immediately with fake data, no auto-hide
            const origShowDuration = SHOW_DURATION;
            const fakeSubs = [
                { nick: 'Jove_Hater_99', tank: 'Об. 430У', isAlly: true },
                { nick: 'SniperPro_2026', tank: 'FV4005', isAlly: true },
                { nick: 'Nagibator228', tank: 'EBR 105', isAlly: false },
            ];
            
            // Override to never hide in instant demo
            const origHide = hideTimeout;
            setTimeout(() => {
                showSubscribers(fakeSubs, { battle_number: 42 });
                // Cancel the auto-hide timer
                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }
            }, 500);
        } else {
            checkBattle();
            setInterval(checkBattle, REFRESH_MS);
        }
    </script>
</body>
</html>
