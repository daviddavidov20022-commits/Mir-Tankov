<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МИР ТАНКОВ — Стрим</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stream.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="app-header__left">
                <div class="app-header__logo">🎮</div>
                <div class="app-header__info">
                    <div class="app-header__title">МИР ТАНКОВ</div>
                    <div class="app-header__subtitle">СТРИМ</div>
                </div>
            </div>
            <div class="app-header__right">
                <div class="profile-badge" onclick="openGame('profile.html')">
                    <span class="profile-badge__icon">👤</span>
                    <span class="profile-badge__name" id="userName">Танкист</span>
                </div>
            </div>
        </header>

        <div class="content-area">
            <button class="btn-back" onclick="goBack()">← Назад</button>

            <!-- Platform Tabs -->
            <div class="platform-tabs" id="platformTabs">
                <button class="platform-tab platform-tab--active" data-platform="twitch" onclick="switchPlatform('twitch')">
                    <span class="platform-tab__icon">💜</span>
                    <span class="platform-tab__name">Twitch</span>
                </button>
                <button class="platform-tab" data-platform="vk" onclick="switchPlatform('vk')">
                    <span class="platform-tab__icon">🔵</span>
                    <span class="platform-tab__name">VK</span>
                </button>
                <button class="platform-tab" data-platform="youtube" onclick="switchPlatform('youtube')">
                    <span class="platform-tab__icon">🔴</span>
                    <span class="platform-tab__name">YouTube</span>
                </button>
            </div>

            <!-- Stream Info -->
            <div class="stream-header">
                <div class="stream-header__live" id="streamLiveBadge">
                    <span class="stream-header__dot"></span>
                    <span>LIVE</span>
                </div>
                <div class="stream-header__info">
                    <div class="stream-header__title" id="streamTitle">ISERVERI</div>
                    <div class="stream-header__viewers" id="streamViewers">Загрузка...</div>
                </div>
                <button class="stream-header__settings" onclick="toggleChannelSettings()" title="Сменить канал">⚙️</button>
            </div>

            <!-- Channel Settings (hidden by default) -->
            <div class="channel-settings" id="channelSettings" style="display: none;">
                <div class="channel-settings__title">Сменить канал</div>
                <div class="channel-settings__input-group">
                    <input type="text" id="channelInput" class="channel-settings__input" 
                           placeholder="Имя канала или ссылка..." value="iserveri" autocomplete="off"
                           onkeydown="if(event.key==='Enter')changeChannel()">
                    <button class="channel-settings__btn" onclick="changeChannel()">Подключить</button>
                </div>
                <div class="channel-settings__popular" id="popularChannels">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- Universal Player -->
            <div class="stream-player" id="streamPlayer">
                <div class="stream-player__aspect">
                    <iframe id="streamPlayerIframe" 
                            allowfullscreen
                            frameborder="0">
                    </iframe>
                </div>
            </div>

            <!-- Chat -->
            <div class="stream-chat">
                <div class="stream-chat__header">
                    <div class="stream-chat__title">💬 Общий чат</div>
                    <div class="stream-chat__platforms">
                        <span class="chat-platform-badge chat-platform-badge--twitch" id="chatBadgeTwitch">💜 Twitch</span>
                        <span class="chat-platform-badge chat-platform-badge--telegram" id="chatBadgeTelegram">📱 Telegram</span>
                    </div>
                </div>

                <div class="stream-chat__messages" id="chatMessages">
                    <div class="chat-system-msg">
                        <span class="chat-system-msg__icon">🎮</span>
                        <span>Подключение к чату...</span>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="stream-chat__input-area">
                    <div class="stream-chat__platform-info" id="chatPlatformInfo">
                        💜 → Twitch
                    </div>
                    <input type="text" class="stream-chat__input" id="chatInput" 
                           placeholder="Написать сообщение..." 
                           autocomplete="off" 
                           maxlength="500">
                    <button class="stream-chat__send" id="chatSendBtn" onclick="sendChatMessage()">➤</button>
                </div>
            </div>

            <!-- Admin Panel -->
            <div class="admin-panel" id="adminPanel">
                <div class="admin-panel__header" onclick="toggleAdminPanel()">
                    <span>⚙️ Настройки стрим-хаба (Админ)</span>
                    <span class="admin-panel__toggle">▾</span>
                </div>
                <div class="admin-panel__content" id="adminPanelContent">
                    
                    <!-- Настройка стримера -->
                    <div class="admin-section">
                        <div class="admin-section__title">📺 Настройка трансляции</div>
                        
                        <!-- Twitch -->
                        <div class="admin-platform-row">
                            <label class="admin-toggle">
                                <input type="checkbox" id="adminTwitchEnabled" checked onchange="updateStreamConfig()">
                                <span class="admin-toggle__label">💜 Twitch</span>
                            </label>
                            <input type="text" id="adminTwitchChannel" class="admin-input admin-input--sm" 
                                   placeholder="Имя канала (thejove)" autocomplete="off" onchange="updateStreamConfig()">
                        </div>
                        
                        <!-- YouTube -->
                        <div class="admin-platform-row">
                            <label class="admin-toggle">
                                <input type="checkbox" id="adminYoutubeEnabled" onchange="updateStreamConfig()">
                                <span class="admin-toggle__label">🔴 YouTube</span>
                            </label>
                            <input type="text" id="adminYoutubeChannel" class="admin-input admin-input--sm" 
                                   placeholder="ID канала или ссылка" autocomplete="off" onchange="updateStreamConfig()">
                        </div>
                        
                        <!-- VK -->
                        <div class="admin-platform-row">
                            <label class="admin-toggle">
                                <input type="checkbox" id="adminVkEnabled" onchange="updateStreamConfig()">
                                <span class="admin-toggle__label">🔵 VK</span>
                            </label>
                            <input type="text" id="adminVkChannel" class="admin-input admin-input--sm" 
                                   placeholder="Ссылка на стрим VK" autocomplete="off" onchange="updateStreamConfig()">
                        </div>
                        
                        <button class="admin-save-btn" onclick="saveStreamConfig()">💾 Сохранить настройки</button>
                    </div>

                    <!-- Быстрые каналы -->
                    <div class="admin-section">
                        <div class="admin-section__title">📋 Быстрые каналы</div>
                        <div class="admin-panel__add">
                            <div class="admin-add-row">
                                <input type="text" id="adminChName" class="admin-input admin-input--sm" placeholder="Название" autocomplete="off">
                                <select id="adminChPlatform" class="admin-select">
                                    <option value="twitch">💜 Twitch</option>
                                    <option value="youtube">🔴 YouTube</option>
                                    <option value="vk">🔵 VK</option>
                                </select>
                            </div>
                            <div class="admin-add-row">
                                <input type="text" id="adminChUrl" class="admin-input admin-input--sm" placeholder="Канал/ссылка" autocomplete="off">
                                <button class="admin-add-btn-sm" onclick="addChannel()">➕</button>
                            </div>
                        </div>
                        <div class="admin-channel-list" id="adminChannelList">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <nav class="bottom-nav">
            <a class="bottom-nav__item" onclick="openGame('index.html')">
                <span class="bottom-nav__icon">🏠</span>
                <span class="bottom-nav__label">ГЛАВНАЯ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('top.html')">
                <span class="bottom-nav__icon">🏆</span>
                <span class="bottom-nav__label">ТОП</span>
            </a>
            <a class="bottom-nav__item bottom-nav__item--active">
                <span class="bottom-nav__icon">📺</span>
                <span class="bottom-nav__label">СТРИМ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('friends.html')">
                <span class="bottom-nav__icon">👥</span>
                <span class="bottom-nav__label">ДРУЗЬЯ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('profile.html')">
                <span class="bottom-nav__icon">👤</span>
                <span class="bottom-nav__label">ПРОФИЛЬ</span>
            </a>
        </nav>

        <div class="watermark">@Mir_tankov_privat_bot</div>
    </div>

    <script src="js/stream.js"></script>
</body>

</html>
