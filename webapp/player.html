<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>МИР ТАНКОВ — Стрим</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stream.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-wrapper">
        <!-- Header -->
        <header class="app-header">
            <div class="app-header__left">
                <div class="app-header__logo">🎮</div>
                <div class="app-header__info">
                    <div class="app-header__title">МИР ТАНКОВ</div>
                    <div class="app-header__subtitle">СТРИМ</div>
                </div>
            </div>
            <div class="app-header__right">
                <div class="profile-badge" onclick="openGame('profile.html')">
                    <span class="profile-badge__icon">👤</span>
                    <span class="profile-badge__name" id="userName">Танкист</span>
                </div>
            </div>
        </header>

        <div class="content-area">
            <button class="btn-back" onclick="goBack()">← Назад</button>

            <!-- Stream Info -->
            <div class="stream-header">
                <div class="stream-header__live" id="streamLiveBadge">
                    <span class="stream-header__dot"></span>
                    <span>LIVE</span>
                </div>
                <div class="stream-header__info">
                    <div class="stream-header__title" id="streamTitle">ISERVERI</div>
                    <div class="stream-header__viewers" id="streamViewers">Загрузка...</div>
                </div>
                <button class="stream-header__settings" onclick="toggleChannelSettings()" title="Сменить канал">⚙️</button>
            </div>

            <!-- Channel Settings (hidden by default) -->
            <div class="channel-settings" id="channelSettings" style="display: none;">
                <div class="channel-settings__title">Сменить канал</div>
                <div class="channel-settings__input-group">
                    <input type="text" id="channelInput" class="channel-settings__input" 
                           placeholder="Имя канала или ссылка twitch.tv/..." value="iserveri" autocomplete="off"
                           onkeydown="if(event.key==='Enter')changeChannel()">
                    <button class="channel-settings__btn" onclick="changeChannel()">Подключить</button>
                </div>
                <div class="channel-settings__popular" id="popularChannels">
                    <!-- Filled by JS -->
                </div>
            </div>

            <!-- Twitch Player -->
            <div class="stream-player" id="streamPlayer">
                <div class="stream-player__aspect">
                    <iframe id="twitchPlayer" 
                            allowfullscreen
                            frameborder="0">
                    </iframe>
                </div>
            </div>

            <!-- Chat -->
            <div class="stream-chat">
                <div class="stream-chat__header">
                    <div class="stream-chat__title">💬 Общий чат</div>
                    <div class="stream-chat__platforms">
                        <span class="chat-platform-badge chat-platform-badge--twitch" id="chatBadgeTwitch">💜 Twitch</span>
                        <span class="chat-platform-badge chat-platform-badge--telegram" id="chatBadgeTelegram">📱 Telegram</span>
                    </div>
                </div>

                <div class="stream-chat__messages" id="chatMessages">
                    <div class="chat-system-msg">
                        <span class="chat-system-msg__icon">🎮</span>
                        <span>Подключение к чату...</span>
                    </div>
                </div>

                <!-- Chat Input -->
                <div class="stream-chat__input-area">
                    <div class="stream-chat__platform-select" id="chatPlatformSelect" onclick="toggleChatPlatform()">
                        <span id="chatPlatformIcon">📱</span>
                    </div>
                    <input type="text" class="stream-chat__input" id="chatInput" 
                           placeholder="Написать в Telegram..." 
                           autocomplete="off" 
                           maxlength="500">
                    <button class="stream-chat__send" id="chatSendBtn" onclick="sendChatMessage()">➤</button>
                </div>
            </div>

            <!-- Admin Panel -->
            <div class="admin-panel" id="adminPanel">
                <div class="admin-panel__header" onclick="toggleAdminPanel()">
                    <span>⚙️ Управление каналами (Админ)</span>
                    <span class="admin-panel__toggle">▾</span>
                </div>
                <div class="admin-panel__content" id="adminPanelContent">
                    
                    <div class="admin-panel__add">
                        <div class="admin-panel__add-title">➕ Добавить канал</div>
                        <input type="text" id="adminChName" class="admin-input" placeholder="Название (например: LeBwa)" autocomplete="off">
                        <input type="text" id="adminChUrl" class="admin-input" placeholder="Twitch ссылка или имя (lebwa)" autocomplete="off">
                        <input type="text" id="adminChDesc" class="admin-input" placeholder="Описание (WoT стримы)" autocomplete="off">
                        <button class="admin-add-btn" onclick="addChannel()">➕ Добавить</button>
                    </div>

                    <div class="admin-panel__list-title">📋 Текущие каналы</div>
                    <div class="admin-channel-list" id="adminChannelList">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <!-- Debug (временно) -->
            <div id="adminDebug" style="color:#5A6577;font-size:0.6rem;padding:8px 0;text-align:center;">Загрузка...</div>

        </div>
        <nav class="bottom-nav">
            <a class="bottom-nav__item" onclick="openGame('index.html')">
                <span class="bottom-nav__icon">🏠</span>
                <span class="bottom-nav__label">ГЛАВНАЯ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('top.html')">
                <span class="bottom-nav__icon">🏆</span>
                <span class="bottom-nav__label">ТОП</span>
            </a>
            <a class="bottom-nav__item bottom-nav__item--active">
                <span class="bottom-nav__icon">📺</span>
                <span class="bottom-nav__label">СТРИМ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('friends.html')">
                <span class="bottom-nav__icon">👥</span>
                <span class="bottom-nav__label">ДРУЗЬЯ</span>
            </a>
            <a class="bottom-nav__item" onclick="openGame('profile.html')">
                <span class="bottom-nav__icon">👤</span>
                <span class="bottom-nav__label">ПРОФИЛЬ</span>
            </a>
        </nav>

        <div class="watermark">@Mir_tankov_privat_bot</div>
    </div>

    <script src="js/stream.js"></script>
</body>

</html>
