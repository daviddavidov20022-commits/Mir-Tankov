<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мир Танков — Игроки</title>
    <meta name="description" content="Мир Танков — Все игроки клуба. Рейтинги, онлайн-статус и вызовы!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/top.css?v=14202">
</head>

<body>
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Header -->
    <header class="top-header">
        <button class="back-btn" onclick="goBack()">
            <span>←</span>
        </button>
        <div class="header-title">
            <h1>🏆 Игроки Клуба</h1>
            <span class="header-sub" id="headerSub">Подписчики канала</span>
        </div>
        <div class="header-count" id="headerCount">
            <span class="count-num" id="totalCount">—</span>
            <span class="count-label">игроков</span>
        </div>
    </header>

    <!-- Category Tabs -->
    <div class="category-tabs-wrap">
        <div class="category-tabs" id="categoryTabs">
            <button class="cat-tab cat-tab--active" data-cat="all" onclick="switchCategory('all')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                <span class="cat-tab__label">Все</span>
            </button>
            <button class="cat-tab" data-cat="wn8" onclick="switchCategory('wn8')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                <span class="cat-tab__label">WN8</span>
            </button>
            <button class="cat-tab" data-cat="damage" onclick="switchCategory('damage')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg></span>
                <span class="cat-tab__label">Урон</span>
            </button>
            <button class="cat-tab" data-cat="veteran" onclick="switchCategory('veteran')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15l-3.5-2L2 17l2-6.5L2 7h5l3-5 3 5h5l-2 3.5L18 17l-6.5-2z" stroke-linejoin="round"/><line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round"/><line x1="10" y1="17" x2="10" y2="21"/><line x1="14" y1="17" x2="14" y2="21"/></svg></span>
                <span class="cat-tab__label">Ветеран</span>
            </button>
            <button class="cat-tab" data-cat="battles" onclick="switchCategory('battles')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 17.5L3 6V3h3l11.5 11.5" stroke-linejoin="round"/><path d="M13 7l4-4 4 4-4 4" stroke-linejoin="round"/><path d="M7 13l-4 4 4 4 4-4" stroke-linejoin="round"/><path d="M9.5 6.5L17.5 14.5" stroke-linecap="round"/></svg></span>
                <span class="cat-tab__label">Бои</span>
            </button>
            <button class="cat-tab" data-cat="playtime" onclick="switchCategory('playtime')">
                <span class="cat-tab__icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
                <span class="cat-tab__label">Часы</span>
            </button>
        </div>
    </div>

    <!-- Search/Filter Bar -->
    <div class="filter-bar">
        <div class="search-wrap">
            <span class="search-icon-sm">🔍</span>
            <input type="text" id="filterInput" class="filter-input" placeholder="Поиск по нику..."
                oninput="filterTable()">
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadAllPlayers()" title="Обновить">
            <span class="refresh-icon">🔄</span>
        </button>
    </div>

    <!-- Loading State -->
    <div class="loading-full" id="loadingFull">
        <div class="loading-spinner-lg"></div>
        <p class="loading-text">Загрузка игроков...</p>
        <p class="loading-sub" id="loadingStatus">Получаем данные из базы</p>
    </div>

    <!-- Player Cards List -->
    <div class="players-list" id="playersList" style="display: none;">
        <div class="players-list__inner" id="playersListInner">
            <!-- Генерируется JS -->
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">📭</div>
        <h3>Нет игроков</h3>
        <p>Никто из подписчиков ещё не привязал аккаунт Мир Танков.<br>
            Привяжите ник в профиле через /start → Профиль</p>
    </div>

    <script src="js/app.js?v=14202"></script>
    <script>
        // Динамическая загрузка с cache-bust
        const s = document.createElement('script');
        s.src = 'js/top-page.js?v=' + Date.now();
        document.body.appendChild(s);
    </script>
</body>

</html>
