<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Колесо Элиминации</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-gold: #f5be0b;
            --secondary-gold: #C8AA6E;
            --bg-dark: #07090d;
            --danger-red: #ef4444;
        }

        body {
            background: var(--bg-dark);
            color: #E8E6E3;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(245, 190, 11, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(200, 170, 110, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(20, 24, 33, 1) 0%, var(--bg-dark) 100%);
            z-index: -1;
        }

        .wheel-page {
            width: 100%;
            max-width: 500px;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
        }

        /* Top Nav */
        .wh-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .wh-back-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 15px;
            color: var(--secondary-gold);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
        }

        .wh-back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-4px);
        }

        /* Header */
        .wh-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .wh-header__icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 30px rgba(245, 190, 11, 0.6));
            animation: float 2.5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1.0); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        .wh-header__title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--primary-gold), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .wh-header__prize {
            display: inline-flex;
            align-items: center;
            padding: 8px 20px;
            background: rgba(245, 190, 11, 0.06);
            border: 1px solid rgba(245, 190, 11, 0.2);
            border-radius: 50px;
            color: var(--primary-gold);
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        /* Premium Wheel Container */
        .wh-frame {
            position: relative;
            width: 380px;
            height: 380px;
            margin: 30px auto;
            border-radius: 50%;
            padding: 15px;
            background: linear-gradient(145deg, #1a1e26, #0a0e14);
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 0 2px 1px rgba(245, 190, 11, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .wh-inner-ring {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-radius: 50%;
            border: 1px dashed rgba(245, 190, 11, 0.1);
            pointer-events: none;
            animation: rotateClockwise 60s linear infinite;
        }

        @keyframes rotateClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #wheelCanvas {
            width: 350px;
            height: 350px;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
            border-radius: 50%;
        }

        /* Futuristic Pointer */
        .wh-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(245, 190, 11, 0.6));
        }

        .wh-pointer-shape {
            width: 30px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary-gold), #b38b00);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            border-radius: 4px;
        }

        /* Counter */
        .wh-counter {
            text-align: center;
            margin-bottom: 24px;
        }

        .wh-counter__label {
            font-size: 0.6rem;
            color: #5A6577;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .wh-counter__num {
            font-family: 'Russo One', sans-serif;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Spin Button */
        .wh-spin-btn {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #ef4444, #991b1b);
            color: white;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 25px;
        }

        .wh-spin-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 45px rgba(239, 68, 68, 0.4);
        }

        .wh-spin-btn:active { transform: translateY(0); }

        .wh-spin-btn:disabled {
            background: linear-gradient(135deg, #2d3542, #1a1e26);
            color: #4b5563;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Eliminated List */
        .wh-elim-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .wh-elim-title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.8rem;
            color: #5A6577;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wh-elim-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .wh-elim-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .wh-elim-item {
            display: flex;
            align-items: center;
            background: rgba(239, 68, 68, 0.04);
            border: 1px solid rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            padding: 10px 15px;
            animation: slideInR 0.4s ease forwards;
        }

        @keyframes slideInR {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .wh-elim-item__name {
            flex: 1;
            font-size: 0.8rem;
            color: #5A6577;
            text-decoration: line-through;
            font-weight: 500;
        }

        .wh-elim-item__num {
            font-family: 'Russo One', sans-serif;
            font-size: 0.6rem;
            color: var(--danger-red);
            opacity: 0.6;
            margin-right: 10px;
        }

        /* Winner Modal */
        .wh-winner-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .wh-winner-card {
            background: 
                radial-gradient(circle at 50% 0%, rgba(245, 190, 11, 0.15) 0%, transparent 70%),
                linear-gradient(145deg, #0d1117, #07090d);
            border: 1px solid rgba(245, 190, 11, 0.3);
            border-radius: 32px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(245, 190, 11, 0.2);
            animation: winnerIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes winnerIn {
            from { transform: scale(0.6) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute; top: 15px; right: 15px;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.05);
            border: none; border-radius: 50%;
            color: #666; font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { color: #fff; background: rgba(255,0,0,0.2); }

        .winner-crown {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--primary-gold));
        }

        .winner-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .winner-name {
            font-family: 'Russo One', sans-serif;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(245, 190, 11, 0.5);
        }

        .winner-prize {
            background: rgba(245, 190, 11, 0.1);
            color: var(--primary-gold);
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 800;
            display: inline-block;
            border: 1px solid rgba(245, 190, 11, 0.2);
            margin-bottom: 30px;
        }

        .modal-back-btn {
            background: linear-gradient(135deg, var(--primary-gold), #b38b00);
            color: #07090d;
            border: none; border-radius: 16px;
            padding: 16px 40px;
            font-family: 'Russo One', sans-serif;
            font-size: 1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(245, 190, 11, 0.3);
            transition: all 0.3s;
        }
        .modal-back-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(245, 190, 11, 0.4); }

        /* Loading */
        .wh-loading {
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .wh-loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(245, 190, 11, 0.1);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="wheel-page">
        <div class="wh-nav">
            <button class="wh-back-btn" onclick="history.back()">
                <span>&larr;</span> Назад
            </button>
            <div style="font-size:0.6rem; color:#5A6577; text-transform:uppercase; letter-spacing:1px">Колесо Элиминации</div>
        </div>

        <div class="wh-header">
            <div class="wh-header__icon">🎡</div>
            <h1 class="wh-header__title">Колесо Элиминации</h1>
            <div class="wh-header__prize" id="whPrize">🏆 Загрузка приза...</div>
        </div>

        <div class="wh-loading" id="whLoading">
            <div class="wh-loading-spinner"></div>
            <div style="color:#5A6577; font-size:0.8rem">Собираем участников...</div>
        </div>

        <div id="whContent" style="display:none">
            <div class="wh-frame">
                <div class="wh-inner-ring"></div>
                <div class="wh-pointer">
                    <div class="wh-pointer-shape"></div>
                </div>
                <div class="wh-canvas-container">
                    <canvas id="wheelCanvas" width="700" height="700"></canvas>
                </div>
            </div>

            <div class="wh-counter">
                <div class="wh-counter__num" id="whRemaining">0</div>
                <div class="wh-counter__label">участников в игре</div>
            </div>

            <button class="wh-spin-btn" id="whSpinBtn" onclick="spinWheel()">
                КРУТИТЬ КОЛЕСО
            </button>

            <div class="wh-elim-section">
                <div class="wh-elim-title">📜 История выбывания</div>
                <div class="wh-elim-grid" id="whElimList"></div>
            </div>
        </div>
    </div>

    <script>
    const BOT_API_URL = localStorage.getItem('bot_api_url') || 
        (location.hostname === 'localhost' ? 'http://localhost:8443' : 'https://mir-tankov-production.up.railway.app');
    const myTelegramId = localStorage.getItem('my_telegram_id') || '';

    const COLORS_TOP = ['#f5be0b', '#FFD700', '#C8AA6E', '#f59e0b', '#eab308'];
    const COLORS_OTHER = ['#1e293b', '#334155', '#1e293b', '#334155', '#0f172a'];

    let wheelData = null;
    let participants = [];
    let spinning = false;
    let currentRotation = 0;
    let eliminatedList = [];

    // ==========================================
    // LOAD DATA
    // ==========================================
    async function loadWheelData() {
        const params = new URLSearchParams(location.search);
        const challengeId = params.get('challenge_id');
        if (!challengeId) {
            document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">No challenge_id</div>';
            return;
        }

        try {
            const resp = await fetch(BOT_API_URL + '/api/global-challenge/wheel-data?challenge_id=' + challengeId);
            wheelData = await resp.json();

            if (wheelData.error) {
                document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">' + wheelData.error + '</div>';
                return;
            }

            document.getElementById('whPrize').textContent = '🏆 ' + (wheelData.challenge.prize_description || 'ПРИЗ');

            participants = wheelData.participants.filter(function(p) { return !p.eliminated; });
            eliminatedList = wheelData.participants
                .filter(function(p) { return p.eliminated; })
                .sort(function(a, b) { return (a.eliminated_order || 0) - (b.eliminated_order || 0); });

            document.getElementById('whRemaining').textContent = participants.length;
            document.getElementById('whLoading').style.display = 'none';
            document.getElementById('whContent').style.display = 'block';

            renderEliminated();
            drawWheel();

            if (participants.length === 1) {
                showWinner(participants[0]);
            }
        } catch (e) {
            document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">Error: ' + e.message + '</div>';
        }
    }

    // ==========================================
    // DRAW WHEEL
    // ==========================================
    function drawWheel() {
        var canvas = document.getElementById('wheelCanvas');
        var ctx = canvas.getContext('2d');
        var W = canvas.width;
        var H = canvas.height;
        var cx = W / 2;
        var cy = H / 2;
        var radius = W / 2 - 10;

        ctx.clearRect(0, 0, W, H);
        if (!participants.length) return;

        var totalWeight = participants.reduce(function(s, p) { return s + (p.multiplier || 1); }, 0);
        var startAngle = currentRotation;

        participants.forEach(function(p, i) {
            var weight = p.multiplier || 1;
            var sliceAngle = (weight / totalWeight) * Math.PI * 2;

            var grad = ctx.createRadialGradient(cx, cy, radius * 0.2, cx, cy, radius);
            var colorIdx = i % (p.is_top ? COLORS_TOP.length : COLORS_OTHER.length);
            var baseColor = p.is_top ? COLORS_TOP[colorIdx] : COLORS_OTHER[colorIdx];
            
            grad.addColorStop(0, hexToRgba(baseColor, 0.9));
            grad.addColorStop(1, hexToRgba(baseColor, 0.7));

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = p.is_top ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 2;
            ctx.stroke();

            var midAngle = startAngle + sliceAngle / 2;
            var textRadius = radius * 0.7;
            var tx = cx + Math.cos(midAngle) * textRadius;
            var ty = cy + Math.sin(midAngle) * textRadius;

            ctx.save();
            ctx.translate(tx, ty);
            ctx.rotate(midAngle);

            var nick = (p.nickname || 'Player').substring(0, 15);
            var fontSize = Math.min(24, Math.max(12, sliceAngle * radius * 0.15));
            ctx.font = '800 ' + fontSize + "px 'Inter', sans-serif";
            ctx.fillStyle = p.is_top ? '#000' : '#E8E6E3';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(nick, 0, 0);
            ctx.shadowBlur = 0;

            if (p.multiplier > 1) {
                ctx.font = '700 ' + (fontSize * 0.65) + "px 'Inter', sans-serif";
                ctx.fillStyle = p.is_top ? 'rgba(0,0,0,0.5)' : '#f5be0b';
                ctx.fillText('x' + p.multiplier, 0, fontSize * 0.85);
            }

            ctx.restore();
            startAngle += sliceAngle;
        });

        // Gloss overlay
        var gloss = ctx.createLinearGradient(0, 0, W, H);
        gloss.addColorStop(0, 'rgba(255,255,255,0.1)');
        gloss.addColorStop(0.5, 'transparent');
        gloss.addColorStop(1, 'rgba(255,255,255,0.05)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = gloss;
        ctx.fill();

        // Center cap
        ctx.beginPath();
        ctx.arc(cx, cy, 50, 0, Math.PI * 2);
        var centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
        centerGrad.addColorStop(0, '#222');
        centerGrad.addColorStop(1, '#000');
        ctx.fillStyle = centerGrad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(245, 190, 11, 0.4)';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.font = "bold 26px 'Russo One', sans-serif";
        ctx.fillStyle = '#f5be0b';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(participants.length.toString(), cx, cy);
    }

    function hexToRgba(hex, alpha) {
        var r = 0, g = 0, b = 0;
        if (hex.length === 4) {
            r = parseInt(hex[1] + hex[1], 16);
            g = parseInt(hex[2] + hex[2], 16);
            b = parseInt(hex[3] + hex[3], 16);
        } else if (hex.length === 7) {
            r = parseInt(hex.substring(1, 3), 16);
            g = parseInt(hex.substring(3, 5), 16);
            b = parseInt(hex.substring(5, 7), 16);
        }
        return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    // ==========================================
    // SPIN WHEEL
    // ==========================================
    function spinWheel() {
        if (spinning || participants.length <= 1) return;
        spinning = true;

        var btn = document.getElementById('whSpinBtn');
        btn.disabled = true;
        btn.textContent = 'УДАЧА РЕШАЕТ...';

        var totalInverseWeight = participants.reduce(function(s, p) { return s + (1 / (p.multiplier || 1)); }, 0);
        var random = Math.random() * totalInverseWeight;
        var eliminatedIdx = 0;
        for (var i = 0; i < participants.length; i++) {
            random -= 1 / (participants[i].multiplier || 1);
            if (random <= 0) { eliminatedIdx = i; break; }
        }

        var totalWeight = participants.reduce(function(s, p) { return s + (p.multiplier || 1); }, 0);
        var angleSum = 0;
        for (var j = 0; j < eliminatedIdx; j++) {
            angleSum += (participants[j].multiplier || 1) / totalWeight * Math.PI * 2;
        }
        var sliceAngle = (participants[eliminatedIdx].multiplier || 1) / totalWeight * Math.PI * 2;
        var targetMid = angleSum + sliceAngle / 2;

        var pointerAngle = -Math.PI / 2;
        var targetRotation = pointerAngle - targetMid;

        var fullRotations = 6 + Math.floor(Math.random() * 4);
        var finalRotation = targetRotation + fullRotations * Math.PI * 2;

        var startRotation = currentRotation;
        var duration = 4000 + Math.random() * 2000;
        var startTime = Date.now();

        function animate() {
            var elapsed = Date.now() - startTime;
            var progress = Math.min(elapsed / duration, 1);
            var eased = 1 - Math.pow(1 - progress, 4);

            currentRotation = startRotation + (finalRotation - startRotation) * eased;
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                eliminateParticipant(participants[eliminatedIdx]);
            }
        }
        animate();
    }

    function eliminateParticipant(p) {
        var params = new URLSearchParams(location.search);
        var challengeId = params.get('challenge_id');
        fetch(BOT_API_URL + '/api/global-challenge/wheel-eliminate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ challenge_id: challengeId, telegram_id: p.telegram_id })
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            if (data.success) {
                loadWheelData().then(function() {
                    spinning = false;
                    var btn = document.getElementById('whSpinBtn');
                    btn.disabled = false;
                    btn.textContent = 'КРУТИТЬ КОЛЕСО';
                });
            } else {
                alert('Server error: ' + data.error);
                spinning = false;
            }
        })
        .catch(function(e) {
            alert('Network error: ' + e.message);
            spinning = false;
        });
    }

    function showWinner(winner) {
        launchConfetti();

        var nick = winner.nickname || 'Player';
        var prize = (wheelData && wheelData.challenge && wheelData.challenge.prize_description) || 'ПРИЗ';

        document.getElementById('whSpinBtn').style.display = 'none';

        var modal = document.createElement('div');
        modal.className = 'wh-winner-modal';
        modal.innerHTML = 
            '<div class="wh-winner-card">' +
                '<button class="modal-close" onclick="this.closest(\'.wh-winner-modal\').remove()">&#10005;</button>' +
                '<div class="winner-crown">👑</div>' +
                '<div class="winner-name">' + nick + '</div>' +
                '<div class="winner-title">ПОБЕДИТЕЛЬ!</div>' +
                '<div class="winner-prize">🏆 ' + prize + '</div>' +
                '<div>' +
                   '<button class="modal-back-btn" onclick="history.back()">ВЕРНУТЬСЯ НА АРЕНУ</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(modal);
    }

    function renderEliminated() {
        var container = document.getElementById('whElimList');
        if (!eliminatedList || !eliminatedList.length) {
            container.innerHTML = '<div style="text-align:center;color:#334155;font-size:0.75rem;padding:20px">Никто еще не выбыл</div>';
            return;
        }

        var html = '';
        for (var i = 0; i < eliminatedList.length; i++) {
            var p = eliminatedList[i];
            html += '<div class="wh-elim-item" style="animation-delay: ' + (i * 0.1) + 's">' +
                '<span class="wh-elim-item__num">#' + p.eliminated_order + '</span>' +
                '<span class="wh-elim-item__name">' + p.nickname + '</span>' +
                '<span style="font-size:0.9rem">&#10060;</span>' +
            '</div>';
        }
        container.innerHTML = html;
    }

    // ==========================================
    // CONFETTI
    // ==========================================
    function launchConfetti() {
        if (typeof confetti === 'function') {
            runConfetti();
        } else {
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js';
            script.onload = runConfetti;
            document.head.appendChild(script);
        }
    }

    function runConfetti() {
        var duration = 5000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2000 };

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) { clearInterval(interval); return; }

            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount: particleCount, origin: { x: 0.1 + Math.random() * 0.2, y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount: particleCount, origin: { x: 0.7 + Math.random() * 0.2, y: Math.random() - 0.2 } }));
        }, 250);
    }

    window.onload = loadWheelData;
    </script>
</body>
