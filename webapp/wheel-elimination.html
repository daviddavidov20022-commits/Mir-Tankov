<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 Колесо Элиминации</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #f5be0b;
            --gold2: #C8AA6E;
            --bg: #07090d;
            --card: rgba(13, 17, 23, 0.6);
            --red: #ef4444;
            --green: #22c55e;
        }

        body {
            background: var(--bg);
            color: #E8E6E3;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(245,190,11,0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(200,170,110,0.03) 0%, transparent 40%);
            z-index: -1;
        }

        /* === LAYOUT === */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Nav */
        .top-nav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 10px 16px;
            color: var(--gold2); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.08); }
        .nav-label { font-size: 0.55rem; color: #5A6577; text-transform: uppercase; letter-spacing: 2px; }

        /* Header */
        .wh-header { text-align: center; margin-bottom: 24px; }
        .wh-header__icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 25px rgba(245,190,11,0.5));
            animation: bob 2.5s ease-in-out infinite;
        }
        @keyframes bob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .wh-header__title {
            font-family: 'Russo One', sans-serif; font-size: 1.4rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin: 6px 0;
        }
        .wh-header__prize {
            display: inline-flex; align-items: center;
            padding: 6px 18px; margin-top: 8px;
            background: rgba(245,190,11,0.06);
            border: 1px solid rgba(245,190,11,0.2);
            border-radius: 50px;
            color: var(--gold); font-weight: 700; font-size: 0.8rem;
        }

        /* Main 2-column layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 700px) {
            .main-grid {
                grid-template-columns: auto 1fr;
                align-items: start;
            }
        }

        /* === LEFT: WHEEL === */
        .wheel-col { display: flex; flex-direction: column; align-items: center; }

        .wh-frame {
            position: relative;
            width: 340px; height: 340px;
            border-radius: 50%;
            padding: 12px;
            background: linear-gradient(145deg, #1a1e26, #0a0e14);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 40px rgba(0,0,0,0.5), 0 0 2px 1px rgba(245,190,11,0.15);
            display: flex; justify-content: center; align-items: center;
        }
        .wh-ring {
            position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border-radius: 50%; border: 1px dashed rgba(245,190,11,0.08);
            pointer-events: none; animation: ringRot 60s linear infinite;
        }
        @keyframes ringRot { to { transform: rotate(360deg); } }

        #wheelCanvas { width: 316px; height: 316px; border-radius: 50%; }

        .wh-pointer {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); z-index: 10;
            filter: drop-shadow(0 4px 12px rgba(245,190,11,0.6));
        }
        .pointer-shape {
            width: 28px; height: 40px;
            background: linear-gradient(135deg, var(--gold), #b38b00);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }

        .wh-counter { text-align: center; margin: 16px 0; }
        .wh-counter__num { font-family: 'Russo One', sans-serif; font-size: 2.5rem; color: #fff; }
        .wh-counter__label { font-size: 0.55rem; color: #5A6577; text-transform: uppercase; letter-spacing: 3px; }

        .spin-btn {
            width: 100%; max-width: 340px; padding: 18px;
            border: none; border-radius: 18px;
            font-family: 'Russo One', sans-serif; font-size: 1rem; letter-spacing: 2px;
            cursor: pointer; text-transform: uppercase;
            background: linear-gradient(135deg, #ef4444, #991b1b);
            color: white; box-shadow: 0 8px 28px rgba(239,68,68,0.3);
            transition: all 0.3s;
        }
        .spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(239,68,68,0.4); }
        .spin-btn:disabled { background: linear-gradient(135deg, #2d3542, #1a1e26); color: #4b5563; box-shadow: none; cursor: not-allowed; }

        /* === RIGHT: PARTICIPANTS LIST === */
        .participants-col {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            max-height: 600px;
            overflow-y: auto;
        }
        .participants-col::-webkit-scrollbar { width: 4px; }
        .participants-col::-webkit-scrollbar-track { background: transparent; }
        .participants-col::-webkit-scrollbar-thumb { background: rgba(245,190,11,0.2); border-radius: 4px; }

        .panel-title {
            font-family: 'Russo One', sans-serif;
            font-size: 0.75rem; color: #5A6577;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .panel-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }

        /* Participant Row */
        .p-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            transition: background 0.2s;
            position: relative;
        }
        .p-row:hover { background: rgba(255,255,255,0.03); }
        .p-row--eliminated {
            opacity: 0.35;
        }
        .p-row--eliminated .p-nick { text-decoration: line-through; }

        .p-rank {
            width: 28px; height: 28px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Russo One', sans-serif; font-size: 0.7rem;
            flex-shrink: 0;
        }
        .p-rank--1 { background: linear-gradient(135deg, #f5be0b, #d4a017); color: #000; }
        .p-rank--2 { background: linear-gradient(135deg, #9ca3af, #6b7280); color: #000; }
        .p-rank--3 { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; }
        .p-rank--other { background: rgba(255,255,255,0.04); color: #5A6577; }

        .p-info { flex: 1; min-width: 0; }
        .p-nick {
            font-size: 0.8rem; font-weight: 700; color: #E8E6E3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .p-stat {
            font-size: 0.6rem; color: #5A6577; margin-top: 2px;
        }

        /* Probability bar */
        .p-prob-wrap {
            width: 70px; flex-shrink: 0; text-align: right;
        }
        .p-prob-pct {
            font-family: 'Russo One', sans-serif;
            font-size: 0.75rem;
            color: var(--gold);
        }
        .p-prob-bar {
            height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.06);
            margin-top: 4px; overflow: hidden;
        }
        .p-prob-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--gold), #f59e0b);
            transition: width 0.5s ease;
        }

        .p-elim-badge {
            font-size: 0.55rem; color: var(--red); font-weight: 700;
        }

        /* === BOTTOM: ELIMINATED === */
        .elim-section {
            margin-top: 20px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 20px;
        }
        .elim-grid { display: flex; flex-direction: column; gap: 5px; }
        .elim-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            background: rgba(239,68,68,0.03);
            border: 1px solid rgba(239,68,68,0.08);
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .elim-num { font-family: 'Russo One', sans-serif; font-size: 0.6rem; color: var(--red); opacity: 0.5; width: 28px; }
        .elim-name { flex: 1; font-size: 0.75rem; color: #5A6577; text-decoration: line-through; }
        .elim-x { font-size: 0.8rem; color: var(--red); opacity: 0.4; }

        /* === WINNER MODAL === */
        .winner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .winner-card {
            background: radial-gradient(circle at 50% 0%, rgba(245,190,11,0.15) 0%, transparent 70%), linear-gradient(145deg, #0d1117, #07090d);
            border: 1px solid rgba(245,190,11,0.3);
            border-radius: 32px; padding: 50px 40px;
            width: 90%; max-width: 400px; text-align: center;
            position: relative;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8), 0 0 40px rgba(245,190,11,0.2);
            animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn {
            from { transform: scale(0.6) translateY(40px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .win-close {
            position: absolute; top: 15px; right: 15px;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.05); border: none; border-radius: 50%;
            color: #666; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .win-close:hover { color: #fff; background: rgba(255,0,0,0.2); }
        .win-crown { font-size: 5rem; margin-bottom: 16px; filter: drop-shadow(0 0 20px var(--gold)); }
        .win-name { font-family: 'Russo One', sans-serif; font-size: 2rem; color: #fff; text-shadow: 0 0 20px rgba(245,190,11,0.5); margin-bottom: 8px; }
        .win-label { font-family: 'Russo One', sans-serif; font-size: 1rem; color: #888; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; }
        .win-prize { background: rgba(245,190,11,0.1); color: var(--gold); padding: 12px 20px; border-radius: 15px; font-weight: 800; display: inline-block; border: 1px solid rgba(245,190,11,0.2); margin-bottom: 30px; }
        .win-back {
            background: linear-gradient(135deg, var(--gold), #b38b00);
            color: #07090d; border: none; border-radius: 16px;
            padding: 16px 40px; font-family: 'Russo One', sans-serif;
            font-size: 1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(245,190,11,0.3);
        }
        .win-back:hover { transform: translateY(-3px); }

        /* Loading */
        .wh-loading { padding: 100px 0; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(245,190,11,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="page-wrap">
        <!-- Nav -->
        <div class="top-nav">
            <button class="back-btn" onclick="history.back()"><span>&larr;</span> Назад</button>
            <div class="nav-label">Колесо Элиминации</div>
        </div>

        <!-- Header -->
        <div class="wh-header">
            <div class="wh-header__icon">🎡</div>
            <h1 class="wh-header__title">Колесо Элиминации</h1>
            <div class="wh-header__prize" id="whPrize">🏆 Загрузка...</div>
        </div>

        <!-- Loading -->
        <div class="wh-loading" id="whLoading">
            <div class="spinner"></div>
            <div style="color:#5A6577;font-size:0.8rem">Собираем участников...</div>
        </div>

        <!-- Content -->
        <div id="whContent" style="display:none">
            <div class="main-grid">
                <!-- LEFT: Wheel -->
                <div class="wheel-col">
                    <div class="wh-frame">
                        <div class="wh-ring"></div>
                        <div class="wh-pointer"><div class="pointer-shape"></div></div>
                        <canvas id="wheelCanvas" width="700" height="700"></canvas>
                    </div>
                    <div class="wh-counter">
                        <div class="wh-counter__num" id="whRemaining">0</div>
                        <div class="wh-counter__label">участников в игре</div>
                    </div>
                    <button class="spin-btn" id="whSpinBtn" onclick="spinWheel()">КРУТИТЬ КОЛЕСО</button>
                </div>

                <!-- RIGHT: Participants -->
                <div class="participants-col" id="participantsPanel">
                    <div class="panel-title">📊 Участники и шансы</div>
                    <div id="participantsList"></div>
                </div>
            </div>

            <!-- Eliminated -->
            <div class="elim-section" id="elimSection" style="display:none">
                <div class="panel-title">💀 Выбыли</div>
                <div class="elim-grid" id="whElimList"></div>
            </div>
        </div>
    </div>

    <script>
    var BOT_API_URL = localStorage.getItem('bot_api_url') || 
        (location.hostname === 'localhost' ? 'http://localhost:8443' : 'https://mir-tankov-production.up.railway.app');

    var COLORS_TOP = ['#f5be0b', '#FFD700', '#C8AA6E', '#f59e0b', '#eab308'];
    var COLORS_OTHER = ['#1e293b', '#334155', '#1e293b', '#334155', '#0f172a'];

    var wheelData = null;
    var participants = [];
    var allParticipants = [];
    var spinning = false;
    var currentRotation = 0;
    var eliminatedList = [];

    // ==========================================
    // LOAD DATA
    // ==========================================
    function loadWheelData() {
        var params = new URLSearchParams(location.search);
        var challengeId = params.get('challenge_id');
        if (!challengeId) {
            document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">Нет challenge_id</div>';
            return Promise.resolve();
        }

        return fetch(BOT_API_URL + '/api/global-challenge/wheel-data?challenge_id=' + challengeId)
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            wheelData = data;
            if (data.error) {
                document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">' + data.error + '</div>';
                return;
            }

            document.getElementById('whPrize').textContent = '🏆 ' + (data.challenge.prize_description || 'ПРИЗ');

            allParticipants = data.participants || [];
            participants = allParticipants.filter(function(p) { return !p.eliminated; });
            eliminatedList = allParticipants
                .filter(function(p) { return p.eliminated; })
                .sort(function(a, b) { return (a.eliminated_order || 0) - (b.eliminated_order || 0); });

            document.getElementById('whRemaining').textContent = participants.length;
            document.getElementById('whLoading').style.display = 'none';
            document.getElementById('whContent').style.display = 'block';

            renderParticipantsList();
            renderEliminated();
            drawWheel();

            if (participants.length === 1) {
                showWinner(participants[0]);
            }
        })
        .catch(function(e) {
            document.getElementById('whLoading').innerHTML = '<div style="color:#ef4444">Ошибка: ' + e.message + '</div>';
        });
    }

    // ==========================================
    // PARTICIPANTS LIST WITH PROBABILITIES
    // ==========================================
    function renderParticipantsList() {
        var container = document.getElementById('participantsList');
        if (!allParticipants.length) {
            container.innerHTML = '<div style="text-align:center;color:#5A6577;padding:20px;font-size:0.8rem">Нет участников</div>';
            return;
        }

        // Sort: active first (by multiplier desc), then eliminated
        var active = allParticipants.filter(function(p) { return !p.eliminated; });
        var elim = allParticipants.filter(function(p) { return p.eliminated; });

        // Sort active by current_value desc (best performers first)
        active.sort(function(a, b) { return (b.current_value || 0) - (a.current_value || 0); });

        // Calculate win probabilities for active participants
        // Win probability is proportional to multiplier (higher multiplier = higher chance to survive = higher win chance)
        var totalMultiplier = active.reduce(function(s, p) { return s + (p.multiplier || 1); }, 0);
        var maxProb = 0;
        active.forEach(function(p) {
            p._winProb = totalMultiplier > 0 ? ((p.multiplier || 1) / totalMultiplier * 100) : 0;
            if (p._winProb > maxProb) maxProb = p._winProb;
        });

        var html = '';

        // Active participants
        active.forEach(function(p, i) {
            var rank = i + 1;
            var rankClass = rank <= 3 ? 'p-rank--' + rank : 'p-rank--other';
            var medals = ['', '🥇', '🥈', '🥉'];
            var medal = rank <= 3 ? medals[rank] : '';
            var probPct = p._winProb.toFixed(1);
            var barWidth = maxProb > 0 ? (p._winProb / maxProb * 100) : 0;
            var condIcon = getCondIcon(wheelData && wheelData.challenge ? wheelData.challenge.condition : '');

            html += '<div class="p-row">' +
                '<div class="p-rank ' + rankClass + '">' + (medal || rank) + '</div>' +
                '<div class="p-info">' +
                    '<div class="p-nick">' + (p.nickname || 'Танкист') + '</div>' +
                    '<div class="p-stat">' + condIcon + ' ' + formatNum(p.current_value || 0) + (p.multiplier > 1 ? ' · x' + p.multiplier : '') + '</div>' +
                '</div>' +
                '<div class="p-prob-wrap">' +
                    '<div class="p-prob-pct">' + probPct + '%</div>' +
                    '<div class="p-prob-bar"><div class="p-prob-fill" style="width:' + barWidth + '%"></div></div>' +
                '</div>' +
            '</div>';
        });

        // Eliminated participants (dimmed)
        elim.forEach(function(p) {
            html += '<div class="p-row p-row--eliminated">' +
                '<div class="p-rank p-rank--other">💀</div>' +
                '<div class="p-info">' +
                    '<div class="p-nick">' + (p.nickname || 'Танкист') + '</div>' +
                    '<div class="p-stat">Выбыл #' + (p.eliminated_order || '?') + '</div>' +
                '</div>' +
                '<div class="p-prob-wrap">' +
                    '<div class="p-elim-badge">ВЫБЫЛ</div>' +
                '</div>' +
            '</div>';
        });

        container.innerHTML = html;
    }

    function getCondIcon(cond) {
        var icons = { damage: '💥', frags: '🎯', xp: '⭐', spotting: '👁', blocked: '🛡', wins: '🏆' };
        return icons[cond] || '📊';
    }

    function formatNum(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
        return n.toString();
    }

    // ==========================================
    // DRAW WHEEL
    // ==========================================
    function drawWheel() {
        var canvas = document.getElementById('wheelCanvas');
        var ctx = canvas.getContext('2d');
        var W = canvas.width, H = canvas.height;
        var cx = W / 2, cy = H / 2, radius = W / 2 - 10;

        ctx.clearRect(0, 0, W, H);
        if (!participants.length) return;

        var totalWeight = participants.reduce(function(s, p) { return s + (p.multiplier || 1); }, 0);
        var startAngle = currentRotation;

        participants.forEach(function(p, i) {
            var weight = p.multiplier || 1;
            var sliceAngle = (weight / totalWeight) * Math.PI * 2;

            var grad = ctx.createRadialGradient(cx, cy, radius * 0.15, cx, cy, radius);
            var colorIdx = i % (p.is_top ? COLORS_TOP.length : COLORS_OTHER.length);
            var baseColor = p.is_top ? COLORS_TOP[colorIdx] : COLORS_OTHER[colorIdx];
            grad.addColorStop(0, hexToRgba(baseColor, 0.95));
            grad.addColorStop(1, hexToRgba(baseColor, 0.65));

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, startAngle + sliceAngle);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.strokeStyle = p.is_top ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Nick text
            var midAngle = startAngle + sliceAngle / 2;
            var textR = radius * 0.68;
            ctx.save();
            ctx.translate(cx + Math.cos(midAngle) * textR, cy + Math.sin(midAngle) * textR);
            ctx.rotate(midAngle);

            var nick = (p.nickname || 'Player').substring(0, 14);
            var fSize = Math.min(22, Math.max(11, sliceAngle * radius * 0.14));
            ctx.font = '800 ' + fSize + "px 'Inter',sans-serif";
            ctx.fillStyle = p.is_top ? '#000' : '#E8E6E3';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 3;
            ctx.fillText(nick, 0, 0);
            ctx.shadowBlur = 0;

            if (p.multiplier > 1) {
                ctx.font = '700 ' + (fSize * 0.6) + "px 'Inter',sans-serif";
                ctx.fillStyle = p.is_top ? 'rgba(0,0,0,0.4)' : '#f5be0b';
                ctx.fillText('x' + p.multiplier, 0, fSize * 0.8);
            }
            ctx.restore();
            startAngle += sliceAngle;
        });

        // Gloss
        var gloss = ctx.createLinearGradient(0, 0, W, H);
        gloss.addColorStop(0, 'rgba(255,255,255,0.08)');
        gloss.addColorStop(0.5, 'transparent');
        gloss.addColorStop(1, 'rgba(255,255,255,0.04)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = gloss;
        ctx.fill();

        // Center
        ctx.beginPath();
        ctx.arc(cx, cy, 45, 0, Math.PI * 2);
        var cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45);
        cg.addColorStop(0, '#1a1e26');
        cg.addColorStop(1, '#000');
        ctx.fillStyle = cg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(245,190,11,0.35)';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.font = "bold 24px 'Russo One',sans-serif";
        ctx.fillStyle = '#f5be0b';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(participants.length.toString(), cx, cy);
    }

    function hexToRgba(hex, a) {
        var r = parseInt(hex.substring(1,3),16);
        var g = parseInt(hex.substring(3,5),16);
        var b = parseInt(hex.substring(5,7),16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    }

    // ==========================================
    // SPIN
    // ==========================================
    function spinWheel() {
        if (spinning || participants.length <= 1) return;
        spinning = true;

        var btn = document.getElementById('whSpinBtn');
        btn.disabled = true;
        btn.textContent = 'УДАЧА РЕШАЕТ...';

        var totalInv = participants.reduce(function(s, p) { return s + (1 / (p.multiplier || 1)); }, 0);
        var rnd = Math.random() * totalInv;
        var elimIdx = 0;
        for (var i = 0; i < participants.length; i++) {
            rnd -= 1 / (participants[i].multiplier || 1);
            if (rnd <= 0) { elimIdx = i; break; }
        }

        var tw = participants.reduce(function(s, p) { return s + (p.multiplier || 1); }, 0);
        var aSum = 0;
        for (var j = 0; j < elimIdx; j++) {
            aSum += (participants[j].multiplier || 1) / tw * Math.PI * 2;
        }
        var sAngle = (participants[elimIdx].multiplier || 1) / tw * Math.PI * 2;
        var tMid = aSum + sAngle / 2;

        var pAngle = -Math.PI / 2;
        var tRot = pAngle - tMid;
        var fullRot = 6 + Math.floor(Math.random() * 4);
        var finalRot = tRot + fullRot * Math.PI * 2;

        var startRot = currentRotation;
        var dur = 4000 + Math.random() * 2000;
        var startT = Date.now();

        function animate() {
            var elapsed = Date.now() - startT;
            var prog = Math.min(elapsed / dur, 1);
            var eased = 1 - Math.pow(1 - prog, 4);

            currentRotation = startRot + (finalRot - startRot) * eased;
            drawWheel();

            if (prog < 1) {
                requestAnimationFrame(animate);
            } else {
                doEliminate(participants[elimIdx]);
            }
        }
        animate();
    }

    function doEliminate(p) {
        var params = new URLSearchParams(location.search);
        var cid = params.get('challenge_id');
        fetch(BOT_API_URL + '/api/global-challenge/wheel-eliminate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ challenge_id: cid, telegram_id: p.telegram_id })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                loadWheelData().then(function() {
                    spinning = false;
                    var btn = document.getElementById('whSpinBtn');
                    btn.disabled = false;
                    btn.textContent = 'КРУТИТЬ КОЛЕСО';
                });
            } else {
                alert('Ошибка: ' + d.error);
                spinning = false;
            }
        })
        .catch(function(e) {
            alert('Сеть: ' + e.message);
            spinning = false;
        });
    }

    // ==========================================
    // ELIMINATED LIST
    // ==========================================
    function renderEliminated() {
        var section = document.getElementById('elimSection');
        var container = document.getElementById('whElimList');
        if (!eliminatedList || !eliminatedList.length) {
            section.style.display = 'none';
            return;
        }
        section.style.display = 'block';

        var html = '';
        for (var i = 0; i < eliminatedList.length; i++) {
            var p = eliminatedList[i];
            html += '<div class="elim-item">' +
                '<span class="elim-num">#' + (p.eliminated_order || (i + 1)) + '</span>' +
                '<span class="elim-name">' + (p.nickname || 'Танкист') + '</span>' +
                '<span class="elim-x">✕</span>' +
            '</div>';
        }
        container.innerHTML = html;
    }

    // ==========================================
    // WINNER
    // ==========================================
    function showWinner(winner) {
        launchConfetti();
        var nick = winner.nickname || 'Танкист';
        var prize = (wheelData && wheelData.challenge && wheelData.challenge.prize_description) || 'ПРИЗ';

        document.getElementById('whSpinBtn').style.display = 'none';

        var modal = document.createElement('div');
        modal.className = 'winner-overlay';
        modal.innerHTML =
            '<div class="winner-card">' +
                '<button class="win-close" onclick="this.closest(\'.winner-overlay\').remove()">&#10005;</button>' +
                '<div class="win-crown">👑</div>' +
                '<div class="win-name">' + nick + '</div>' +
                '<div class="win-label">ПОБЕДИТЕЛЬ!</div>' +
                '<div class="win-prize">🏆 ' + prize + '</div>' +
                '<div><button class="win-back" onclick="history.back()">ВЕРНУТЬСЯ</button></div>' +
            '</div>';
        document.body.appendChild(modal);
    }

    // ==========================================
    // CONFETTI
    // ==========================================
    function launchConfetti() {
        if (typeof confetti === 'function') { runConfetti(); return; }
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js';
        s.onload = runConfetti;
        document.head.appendChild(s);
    }
    function runConfetti() {
        var end = Date.now() + 5000;
        var iv = setInterval(function() {
            if (Date.now() > end) { clearInterval(iv); return; }
            var n = 40;
            confetti({ particleCount: n, spread: 360, startVelocity: 30, origin: { x: 0.1 + Math.random() * 0.2, y: Math.random() * 0.4 }, zIndex: 2000 });
            confetti({ particleCount: n, spread: 360, startVelocity: 30, origin: { x: 0.7 + Math.random() * 0.2, y: Math.random() * 0.4 }, zIndex: 2000 });
        }, 250);
    }

    window.onload = loadWheelData;
    </script>
